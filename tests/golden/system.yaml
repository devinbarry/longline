tests:
  # chmod rules
  - id: chmod-777-file
    command: "chmod 777 /tmp/file"
    expected:
      decision: ask
      rule_id: chmod-777
  - id: chmod-777-dir
    command: "chmod 777 /var/www"
    expected:
      decision: ask
      rule_id: chmod-777
  - id: chmod-644-no-rule
    command: "chmod 644 /tmp/file"
    expected:
      decision: ask
      rule_id: chmod-modify
  - id: chmod-755-no-rule
    command: "chmod 755 script.sh"
    expected:
      decision: ask
      rule_id: chmod-modify
  - id: chmod-plus-x-no-rule
    command: "chmod +x script.sh"
    expected:
      decision: ask
      rule_id: chmod-modify

  # process control
  - id: kill-term
    command: "kill -TERM 12345"
    expected:
      decision: ask
      rule_id: kill-process
  - id: killall-process
    command: "killall pytest"
    expected:
      decision: ask
      rule_id: kill-process
  - id: pkill-pattern
    command: "pkill -f pytest"
    expected:
      decision: ask
      rule_id: pkill-pattern

  # visudo / sudoers
  # Bare visudo has no args, so edit-sudoers rule doesn't match (requires /etc/sudoers arg)
  - id: visudo-no-args
    command: "visudo"
    expected:
      decision: ask
  - id: visudo-sudoers-asks
    command: "visudo /etc/sudoers"
    expected:
      decision: ask
      rule_id: edit-sudoers
  - id: fdisk-deny
    command: "fdisk /dev/sda"
    expected:
      decision: deny
      rule_id: fdisk
  - id: gdisk-deny
    command: "gdisk /dev/sdb"
    expected:
      decision: deny
      rule_id: fdisk
  - id: parted-deny
    command: "parted /dev/sda"
    expected:
      decision: deny
      rule_id: fdisk
  - id: partprobe-deny
    command: "partprobe"
    expected:
      decision: deny
      rule_id: fdisk

  # systemctl / launchctl
  - id: systemctl-start
    command: "systemctl start nginx"
    expected:
      decision: ask
      rule_id: systemctl-modify
  - id: systemctl-stop
    command: "systemctl stop docker"
    expected:
      decision: ask
      rule_id: systemctl-modify
  - id: systemctl-restart
    command: "systemctl restart sshd"
    expected:
      decision: ask
      rule_id: systemctl-modify
  - id: systemctl-enable
    command: "systemctl enable nginx"
    expected:
      decision: ask
      rule_id: systemctl-modify
  - id: systemctl-disable
    command: "systemctl disable bluetooth"
    expected:
      decision: ask
      rule_id: systemctl-modify
  - id: systemctl-mask
    command: "systemctl mask NetworkManager"
    expected:
      decision: ask
      rule_id: systemctl-modify
  - id: launchctl-start
    command: "launchctl start com.apple.mdworker"
    expected:
      decision: ask
      rule_id: systemctl-modify
  - id: systemctl-status-no-rule
    command: "systemctl status nginx"
    expected:
      decision: ask

  # crontab
  - id: crontab-edit
    command: "crontab -e"
    expected:
      decision: ask
      rule_id: crontab-modify
  - id: crontab-remove-strict-skipped
    command: "crontab -r"
    expected:
      decision: ask
      rule_id: crontab-modify
  - id: crontab-list-no-rule
    command: "crontab -l"
    expected:
      decision: ask

  # mount / umount
  - id: mount-device
    command: "mount /dev/sda1 /mnt"
    expected:
      decision: ask
      rule_id: mount-unmount
  - id: umount-device
    command: "umount /mnt"
    expected:
      decision: ask
      rule_id: mount-unmount

  # source-env
  - id: source-env-file
    command: "source .env"
    expected:
      decision: ask
      rule_id: source-env
  - id: source-env-local
    command: "source .env.local"
    expected:
      decision: ask
      rule_id: source-env
  - id: source-envrc
    command: "source .envrc"
    expected:
      decision: ask
      rule_id: source-env

  # ── v0.18.4 deny→ask flip coverage ──
  # edit-etc-hosts fires only when tee-any (same severity, same decision) is disabled.
  - id: edit-etc-hosts-tee-asks
    overlay: |
      disable_rules: [tee-any]
    command: "tee /etc/hosts"
    expected:
      decision: ask
      rule_id: edit-etc-hosts
  # edit-sudoers via tee path — also shadowed by tee-any without overlay.
  - id: edit-sudoers-tee-asks
    overlay: |
      disable_rules: [tee-any]
    command: "tee /etc/sudoers"
    expected:
      decision: ask
      rule_id: edit-sudoers
  - id: redirect-write-etc-hosts-asks
    command: "echo '127.0.0.1 foo' > /etc/hosts"
    expected:
      decision: ask
      rule_id: redirect-write-etc
  - id: redirect-write-etc-sudoers-asks
    command: "echo 'user ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
    expected:
      decision: ask
      rule_id: redirect-write-etc
  # crontab-remove is strict-level — needs override_safety_level: strict to fire,
  # and crontab-modify (high, same decision) must be disabled to surface its rule_id.
  - id: crontab-remove-strict-asks
    overlay: |
      override_safety_level: strict
      disable_rules: [crontab-modify]
    command: "crontab -r"
    expected:
      decision: ask
      rule_id: crontab-remove
