      rule_id: cat-env-file
  - id: less-ssh-id-rsa
    command: "less ~/.ssh/id_rsa"
    expected:
      decision: ask
      rule_id: cat-ssh-key
  - id: bat-ssh-id-ecdsa
    command: "bat ~/.ssh/id_ecdsa"
    expected:
      decision: ask
      rule_id: cat-ssh-key
  - id: more-ssh-ed25519
    command: "more ~/.ssh/id_ed25519"
    expected:
      decision: ask
      rule_id: cat-ssh-key
  - id: cat-ssh-key-asks
    command: "cat ~/.ssh/id_rsa"
    expected:
      decision: ask
      rule_id: cat-ssh-key
  - id: less-aws-config
    command: "less ~/.aws/config"
    expected:
      decision: ask
      rule_id: cat-aws-creds
  - id: bat-aws-creds
    command: "bat ~/.aws/credentials"
    expected:
      decision: ask
      rule_id: cat-aws-creds
  - id: bat-kube-config
    command: "bat ~/.kube/config"
    expected:
      decision: ask
      rule_id: cat-kube-config
  - id: less-kube-config
    command: "less ~/.kube/config"
    expected:
      decision: ask
      rule_id: cat-kube-config
  # cp secrets - caught by cp-secrets rule
  - id: cp-env
    command: "cp .env /tmp/backup.env"
    expected:
      decision: ask
      rule_id: cp-secrets
  - id: cp-env-local
    command: "cp .env.local .env.local.bak"
    expected:
      decision: ask
      rule_id: cp-secrets
  - id: cp-ssh-key
    command: "cp ~/.ssh/id_rsa /tmp/key"
    expected:
      decision: ask
      rule_id: cp-secrets
  - id: cp-aws-creds
    command: "cp ~/.aws/credentials /tmp/creds"
    expected:
      decision: ask
      rule_id: cp-secrets
  - id: cp-readme-safe
    command: "cp README.md /tmp/readme.bak"
    expected:
      decision: allow
  # mv - all mv commands require ask
  - id: mv-env
    command: "mv .env .env.old"
    expected:
      decision: ask
      rule_id: mv-any
  - id: mv-ssh-key
    command: "mv ~/.ssh/id_rsa ~/.ssh/id_rsa.bak"
    expected:
      decision: ask
      rule_id: mv-any
  # tee secrets - deny for secrets, ask for others
  # tee-secrets fires only when the broader tee-any (same severity, same decision) is disabled.
  # Without the overlay, tee-any wins via merge ordering and the specific rule_id is masked.
  - id: tee-env-asks
    overlay: |
      disable_rules: [tee-any]
    command: "tee .env"
    expected:
      decision: ask
      rule_id: tee-secrets
  - id: tee-ssh-key-asks
    overlay: |
      disable_rules: [tee-any]
    command: "tee ~/.ssh/id_rsa"
    expected:
      decision: ask
      rule_id: tee-secrets
  - id: tee-kube-config-asks
    overlay: |
      disable_rules: [tee-any]
    command: "tee ~/.kube/config"
    expected:
      decision: ask
      rule_id: tee-secrets
  - id: tee-tmp-file
    command: "tee /tmp/output.txt"
    expected:
      decision: ask
      rule_id: tee-any
  # rm secrets
  - id: rm-env-ask
    command: "rm .env"
    expected:
      decision: ask
      rule_id: rm-secrets
  - id: rm-ssh-key-ask
    command: "rm ~/.ssh/id_rsa"
    expected:
      decision: ask
      rule_id: rm-secrets
  - id: rm-aws-creds-ask
    command: "rm ~/.aws/credentials"
    expected:
      decision: ask
      rule_id: rm-secrets
  - id: rm-safe-file-ask
    command: "rm file.txt"
    expected:
      decision: ask

  # ── redirect-write-ssh-authorized-keys: full wrapper × op matrix ──
  - id: write-authorized-keys-direct
    command: "echo k > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-append
    command: "echo k >> ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-clobber
    command: "echo k >| ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-dupout
    command: "echo k >& ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-combined
    command: "echo k &> ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-bash-c
    command: "bash -c 'echo k' > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-sh-c
    command: "sh -c 'echo k' > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-zsh-c
    command: "zsh -c 'echo k' > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-dash-c
    command: "dash -c 'echo k' > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-ksh-c
    command: "ksh -c 'echo k' > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-sg-c
    command: "sg docker -c 'echo k' > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-assign-prefix
    command: "FOO=bar bash -c 'echo k' > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-xargs-shc
    command: "echo x | xargs -I {} sh -c 'echo k' > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys
  - id: write-authorized-keys-find-exec-shc
    command: "find . -exec sh -c 'echo k' \\; > ~/.ssh/authorized_keys"
    expected:
      decision: ask
      rule_id: redirect-write-ssh-authorized-keys

