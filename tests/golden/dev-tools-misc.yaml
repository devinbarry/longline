tests:
  # ════════════════════════════════════════════════════════════════
  # sleep: always safe (just waits)
  # ════════════════════════════════════════════════════════════════
  - id: sleep-safe
    command: "sleep 5"
    expected:
      decision: allow
  - id: sleep-long-safe
    command: "sleep 60"
    expected:
      decision: allow
  - id: sleep-fractional-safe
    command: "sleep 0.5"
    expected:
      decision: allow

  # ════════════════════════════════════════════════════════════════
  # just: only read-only invocations allowed
  # ════════════════════════════════════════════════════════════════
  # Positive tests (should allow)
  - id: just-list-safe
    command: "just --list"
    expected:
      decision: allow
  - id: just-list-short-safe
    command: "just -l"
    expected:
      decision: allow
  - id: just-version-safe
    command: "just --version"
    expected:
      decision: allow
  - id: just-help-safe
    command: "just --help"
    expected:
      decision: allow
  - id: just-help-short-safe
    command: "just -h"
    expected:
      decision: allow

  # Standard dev recipes (should allow)
  - id: just-build-safe
    command: "just build"
    expected:
      decision: allow
  - id: just-test-safe
    command: "just test"
    expected:
      decision: allow
  - id: just-check-safe
    command: "just check"
    expected:
      decision: allow
  - id: just-fmt-safe
    command: "just fmt"
    expected:
      decision: allow
  - id: just-lint-safe
    command: "just lint"
    expected:
      decision: allow

  # Standard dev recipes (should allow) - release
  - id: just-release-safe
    command: "just release"
    expected:
      decision: allow
  - id: just-release-patch-safe
    command: "just release patch"
    expected:
      decision: allow
  - id: just-release-minor-safe
    command: "just release minor"
    expected:
      decision: allow
  - id: just-release-major-safe
    command: "just release major"
    expected:
      decision: allow

  # Release and install recipes (should allow)
  - id: just-release-prep-safe
    command: "just release-prep patch"
    expected:
      decision: allow
  - id: just-release-prep-minor-safe
    command: "just release-prep minor"
    expected:
      decision: allow
  - id: just-release-finish-safe
    command: "just release-finish"
    expected:
      decision: allow
  - id: just-install-safe
    command: "just install"
    expected:
      decision: allow

  # Negative tests (should ask - runs arbitrary recipes or bare command)
  - id: just-bare
    command: "just"
    expected:
      decision: ask
  - id: just-recipe-clean
    command: "just clean"
    expected:
      decision: ask
  - id: just-unknown-recipe
    command: "just foobar"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # git-cliff: stdout-only invocations allowed
  # ════════════════════════════════════════════════════════════════
  # Positive tests (should allow - output to stdout)
  - id: git-cliff-unreleased-safe
    command: "git-cliff --unreleased"
    expected:
      decision: allow
  - id: git-cliff-latest-safe
    command: "git-cliff --latest"
    expected:
      decision: allow
  - id: git-cliff-current-safe
    command: "git-cliff --current"
    expected:
      decision: allow

  - id: git-cliff-bare-safe
    command: "git-cliff"
    expected:
      decision: allow

  # Negative tests (should ask - writes files or other operations)
  - id: git-cliff-output-ask
    command: "git-cliff -o CHANGELOG.md"
    expected:
      decision: ask
  - id: git-cliff-output-long-ask
    command: "git-cliff --output CHANGELOG.md"
    expected:
      decision: ask
  - id: git-cliff-output-equals-ask
    command: "git-cliff --output=CHANGELOG.md"
    expected:
      decision: ask
  - id: git-cliff-output-short-attached-ask
    command: "git-cliff -oCHANGELOG.md"
    expected:
      decision: ask
  - id: git-cliff-tag-ask
    command: "git-cliff --tag v1.0.0"
    expected:
      decision: ask
  - id: git-cliff-tag-equals-ask
    command: "git-cliff --tag=v1.0.0"
    expected:
      decision: ask
  - id: git-cliff-init-ask
    command: "git-cliff --init"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # chmod: should always ask (modifies permissions)
  # ════════════════════════════════════════════════════════════════
  - id: chmod-executable-ask
    command: "chmod +x script.sh"
    expected:
      decision: ask
  - id: chmod-755-ask
    command: "chmod 755 script.sh"
    expected:
      decision: ask
  - id: chmod-recursive-ask
    command: "chmod -R +x scripts/"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # pfp (Prefect Pipeline CLI): read-only invocations allowed
  # ════════════════════════════════════════════════════════════════
  # Positive tests (should allow - read-only)
  - id: pfp-ls-safe
    command: "pfp ls"
    expected:
      decision: allow
  - id: pfp-ls-json-safe
    command: "pfp ls --json"
    expected:
      decision: allow
  - id: pfp-list-safe
    command: "pfp list"
    expected:
      decision: allow
  - id: pfp-runs-safe
    command: "pfp runs happy-t"
    expected:
      decision: allow
  - id: pfp-runs-json-safe
    command: "pfp runs happy-t --json"
    expected:
      decision: allow
  - id: pfp-logs-safe
    command: "pfp logs e130c152-db01-428a-9698-e8404cd2c5d3"
    expected:
      decision: allow
  - id: pfp-logs-short-id-safe
    command: "pfp logs e130c152"
    expected:
      decision: allow
  - id: pfp-help-safe
    command: "pfp --help"
    expected:
      decision: allow
  - id: pfp-help-short-safe
    command: "pfp -h"
    expected:
      decision: allow
  - id: pfp-version-safe
    command: "pfp --version"
    expected:
      decision: allow
  # Mutating operations (should ask at standard trust, require full trust)
  - id: pfp-run-ask
    command: "pfp run deploy"
    expected:
      decision: ask
  - id: pfp-pause-ask
    command: "pfp pause abc123"
    expected:
      decision: ask
  - id: pfp-resume-ask
    command: "pfp resume abc123"
    expected:
      decision: ask
  - id: pfp-cancel-ask
    command: "pfp cancel abc123"
    expected:
      decision: ask
  # Negative tests (should ask - bare or unknown)
  - id: pfp-bare-ask
    command: "pfp"
    expected:
      decision: ask
  - id: pfp-unknown-ask
    command: "pfp unknown-command"
    expected:
      decision: ask
