tests:
  - id: profile-rule-fires-when-selected
    overlay: |
      profiles:
        strict:
          rules:
            - id: profile-deny-curl
              level: high
              match: { command: curl }
              decision: deny
              reason: "strict denies curl"
    profile: strict
    command: "curl https://example.com"
    expected:
      decision: deny
      rule_id: profile-deny-curl

  # curl is allowlisted by default; the profile rule (deny) does NOT fire
  # because profile "default" adds no rules. Expected: allow (allowlisted).
  - id: profile-rule-skipped-under-default
    overlay: |
      profiles:
        strict:
          rules:
            - id: profile-deny-curl
              level: high
              match: { command: curl }
              decision: deny
              reason: "strict denies curl"
    profile: default
    command: "curl https://example.com"
    expected:
      decision: allow

  # The parent "base" profile denies a command that is NOT in the builtin
  # allowlist. This confirms the deny rule fires before the child test shows
  # the replacement removes it.
  - id: parent-base-denies-unallowlisted-command
    overlay: |
      profiles:
        base:
          rules:
            - id: shared
              level: high
              match: { command: myfictitioustool }
              decision: deny
              reason: "base"
        permissive:
          extends: base
          rules:
            - id: shared
              level: high
              match: { command: myfictitioustool }
              decision: allow
              reason: "permissive"
    profile: base
    command: "myfictitioustool --run"
    expected:
      decision: deny
      rule_id: shared

  # The child profile replaces the parent's "shared" deny rule with an allow
  # rule of the same id. The command is NOT in the builtin allowlist, so the
  # only path to allow is the profile allow rule activating allow_rule_covers
  # in the all-covered gate. This proves apply_profile_overlay's id-replacement
  # actually weakened the parent rule rather than just removing a rule that the
  # allowlist would have covered anyway.
  - id: child-weakens-parent-via-id
    overlay: |
      profiles:
        base:
          rules:
            - id: shared
              level: high
              match: { command: myfictitioustool }
              decision: deny
              reason: "base"
        permissive:
          extends: base
          rules:
            - id: shared
              level: high
              match: { command: myfictitioustool }
              decision: allow
              reason: "permissive"
    profile: permissive
    command: "myfictitioustool --run"
    expected:
      decision: allow

  # An empty overlay string is byte-identical to running with no overlay.
  # ls is allowlisted by default.
  - id: empty-overlay-byte-identical-to-default
    overlay: ""
    profile: default
    command: "ls"
    expected:
      decision: allow
