# Bare and inline variable assignment tests.
# - Assignments whose embedded substitutions are all allowlisted are safe (allow).
# - BUT an assignment (or `read`) to a command-resolution / code-injection env var
#   (PATH, LD_*, DYLD_*, BASH_ENV, ENV, ZDOTDIR, PROMPT_COMMAND, interpreter/toolchain
#   knobs, PAGER/MANPAGER/GIT_WEB_BROWSER, the git-env-rce-vars GIT_*/SSH_ASKPASS set)
#   now ASKs via the sensitive_env classifier (rule_id: sensitive-env-assignment),
#   because a LATER leaf can inherit it and run hijacked. Benign vars stay allow.
tests:
  # -- Safe bare assignments (allow) ----------------------------------------
  - id: bare-assign-safe-date
    command: "VAR=$(date)"
    expected:
      decision: allow

  - id: bare-assign-safe-ls
    command: "VAR=$(ls -la)"
    expected:
      decision: allow

  - id: bare-assign-safe-pwd
    command: "DIR=$(pwd)"
    expected:
      decision: allow

  - id: bare-assign-safe-whoami
    command: "USER=$(whoami)"
    expected:
      decision: allow

  - id: bare-assign-plain-value
    command: "VAR=hello"
    expected:
      decision: allow

  - id: bare-assign-plain-path
    command: "PATH=/usr/bin"
    expected:
      decision: ask
      rule_id: sensitive-env-assignment

  - id: bare-assign-pipeline-subst
    command: "VAR=$(ls | grep foo | sort)"
    expected:
      decision: allow

  - id: bare-assign-git-subst
    command: "BRANCH=$(git branch --show-current)"
    expected:
      decision: allow

  - id: bare-assign-wc-subst
    command: "COUNT=$(wc -l < file.txt)"
    expected:
      decision: allow

  - id: bare-assign-backtick-safe
    command: "VAR=`date`"
    expected:
      decision: allow

  # -- Bare assignment chained with safe commands (allow) --------------------
  - id: bare-assign-chain-echo
    command: "RESULT=$(grep foo bar) && echo $RESULT"
    expected:
      decision: allow

  - id: bare-assign-chain-multiple
    command: "A=$(date) && B=$(pwd) && echo $A $B"
    expected:
      decision: allow

  - id: bare-assign-semicolon-chain
    command: "A=$(date); B=$(pwd)"
    expected:
      decision: allow

  # -- Dangerous bare assignments (deny) ------------------------------------
  - id: bare-assign-deny-rm
    command: "VAR=$(rm -rf /)"
    expected:
      decision: deny
      rule_id: rm-recursive-root

  - id: bare-assign-asks-cat-env
    command: "SECRET=$(cat .env)"
    expected:
      decision: ask
      rule_id: cat-env-file

  - id: bare-assign-asks-cat-ssh
    command: "KEY=$(cat ~/.ssh/id_rsa)"
    expected:
      decision: ask
      rule_id: cat-ssh-key

  # -- Unknown command in bare assignment (ask) -----------------------------
  - id: bare-assign-ask-unknown
    command: "VAR=$(unknown_tool)"
    expected:
      decision: ask

  - id: bare-assign-ask-unknown-pipeline
    command: "VAR=$(unknown_tool | grep foo)"
    expected:
      decision: ask

  # ── R11: sensitive env-assignment / read guard (ask) ──────────────────────
  - id: r11-path-prefix-commandless
    command: "PATH=.:$PATH; git status"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-ld-preload-commandless
    command: "LD_PRELOAD=/evil.so; ls"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-bash-env-commandless
    command: "BASH_ENV=/tmp/x; ls"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-git-ssh-command-split-leaf
    command: "GIT_SSH_COMMAND=x; git fetch"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-ld-preload-inline
    command: "LD_PRELOAD=/evil.so ls"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-dyld-inline
    command: "DYLD_INSERT_LIBRARIES=/e.dylib ls"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-git-config-key-glob
    command: "GIT_CONFIG_KEY_0=core.sshCommand; git status"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-wrapper-extra-leaf-command
    command: "command LD_PRELOAD=/e.so ls"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-export-declaration-builtin
    command: "export PATH=.:$PATH"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-rustc-wrapper-inline
    command: "RUSTC_WRAPPER=/evil cargo build"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-manpager-inline
    command: "MANPAGER=/evil man ls"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-read-path-subscript
    command: "read PATH[0]"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-path-append-inline
    command: "PATH+=(/evil) ls"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-version-check-ordering
    command: "LD_PRELOAD=/x ls --version"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-read-herestring
    command: "read PATH <<< '.:$PATH'; git status"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-read-flag-positional
    command: "read -r PATH foo"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-bash-c-inner-list
    command: "bash -c 'PATH=.:$PATH; git status'"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-lowercase-path-benign
    command: "path=.:$PATH; git status"
    expected: { decision: allow }

  # ── R11: printf -v NAME assigns shell variable NAME (ask) ─────────────────
  - id: r11-printf-v-path
    command: "printf -v PATH /tmp; git status"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-printf-v-combined
    command: "printf -vPATH /tmp"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-printf-v-bash-c
    command: "bash -c 'printf -v PATH /tmp; git status'"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-printf-format-path-benign
    command: "printf 'PATH=%s' /tmp"
    expected: { decision: allow }
  - id: r11-printf-v-benign-target
    command: "printf -v FOO bar; echo hi"
    expected: { decision: allow }
  - id: r11-printf-dashdash-terminates-options
    command: "printf -- -v PATH"
    expected: { decision: allow }
  - id: r11-printf-v-after-format-benign
    command: "printf '%s' -vPATH"
    expected: { decision: allow }

  # ── R11: precedence guard — existing deny is NOT downgraded ────────────────
  - id: r11-git-env-rce-inline-stays-deny
    command: "GIT_SSH_COMMAND=x git fetch"
    expected: { decision: deny, rule_id: git-env-rce-vars }

  # ── R11: falsifiable benign partners (variable-scoped, not blanket) ────────
  - id: r11-benign-foo
    command: "FOO=bar; echo hi"
    expected: { decision: allow }
  - id: r11-benign-node-env
    command: "NODE_ENV=production; echo hi"
    expected: { decision: allow }
  - id: r11-benign-environment-collision
    command: "ENVIRONMENT=prod; echo hi"
    expected: { decision: allow }
  - id: r11-benign-my-env-collision
    command: "MY_ENV=x; echo hi"
    expected: { decision: allow }
  - id: r11-benign-git-author
    command: "GIT_AUTHOR_NAME=x git commit -m y"
    expected: { decision: allow }
  - id: r11-benign-ssh-auth-sock
    command: "SSH_AUTH_SOCK=/tmp/s ls"
    expected: { decision: allow }
  - id: r11-benign-ldflags-boundary
    command: "LDFLAGS=-O2 ls"
    expected: { decision: allow }
  - id: r11-excluded-ifs
    command: "IFS=, echo hi"
    expected: { decision: allow }
  - id: r11-excluded-home
    command: "HOME=/tmp git status"
    expected: { decision: allow }
  - id: r11-editor-unsafe-git-deny
    command: "EDITOR=vim git commit -m y"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: r11-editor-noop-commandless-allow
    command: "EDITOR=true"
    expected: { decision: allow }
  - id: r11-visual-noop-commandless-allow
    command: "VISUAL=true"
    expected: { decision: allow }
  - id: r11-git-editor-noop-commandless-allow
    command: "GIT_EDITOR=true"
    expected: { decision: allow }
  - id: r11-git-sequence-editor-noop-commandless-allow
    command: "GIT_SEQUENCE_EDITOR=true"
    expected: { decision: allow }
  - id: r11-editor-noop-safe-command-allow
    command: "EDITOR=true echo hi"
    expected: { decision: allow }
  - id: r11-editor-noop-export-inherits-builtin-policy
    command: "export EDITOR=true"
    expected: { decision: ask }
  - id: r11-editor-unsafe-export-asks
    command: "export EDITOR=vim"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-visual-noop-safe-command-allow
    command: "VISUAL=true echo hi"
    expected: { decision: allow }
  - id: r11-editor-unsafe-commandless-asks
    command: "EDITOR=vim"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-visual-unsafe-commandless-asks
    command: "VISUAL=code"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-editor-expanded-commandless-asks
    command: 'EDITOR="$EDITOR"'
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-editor-non-git-command-asks
    command: "EDITOR=vim vim file"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-visual-non-git-command-asks
    command: "VISUAL=code some-tool"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-editor-noop-inherits-underlying-command-policy
    command: "EDITOR=true vim file"
    expected: { decision: ask }
  - id: r11-git-editor-noop-list-rebase-still-asks
    command: "GIT_EDITOR=true; git rebase --continue"
    expected: { decision: ask, rule_id: git-rebase }
  - id: r11-editor-unsafe-list-asks
    command: "EDITOR=vim; git status"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-editor-unsafe-outer-shell-c-asks
    command: "EDITOR=vim bash -c 'git status'"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-read-editor-asks
    command: "read EDITOR"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-read-visual-asks
    command: "read VISUAL"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-printf-v-editor-asks
    command: "printf -v EDITOR vim"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-printf-v-visual-asks
    command: "printf -vVISUAL code"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: r11-benign-read-answer
    command: "read answer"
    expected: { decision: allow }
