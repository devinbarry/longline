# Shell builtins: declaration commands, unset, source, command, builtin
# These test proper parsing and evaluation of Bash built-in commands.
tests:
  # ════════════════════════════════════════════════════════════════
  # export (tree-sitter: declaration_command)
  # ════════════════════════════════════════════════════════════════

  # ── Bare export: no matching rule → ask ───────────────────────
  - id: export-var-ask
    command: "export FOO=bar"
    expected:
      decision: ask
  - id: export-multiple-ask
    command: "export FOO=bar BAZ=qux"
    expected:
      decision: ask
  - id: export-name-only-ask
    command: "export FOO"
    expected:
      decision: ask
  - id: export-path-ask
    command: "export PATH=/usr/bin:$PATH"
    expected:
      decision: ask

  # ── export in compound: should not poison other leaves ────────
  - id: export-and-ls-ask
    command: "export FOO=bar && ls"
    expected:
      decision: ask
    note: "export is ask (no allowlist), ls is allow → ask wins (not opaque)"
  - id: export-and-echo-ask
    command: "export FOO=bar && echo hello"
    expected:
      decision: ask
    note: "export is ask, echo is allow → ask (not opaque/unrecognized)"

  # ════════════════════════════════════════════════════════════════
  # declare (tree-sitter: declaration_command)
  # ════════════════════════════════════════════════════════════════
  - id: declare-var-ask
    command: "declare -x FOO=bar"
    expected:
      decision: ask
  - id: declare-array-ask
    command: "declare -a arr=(1 2 3)"
    expected:
      decision: ask
  - id: declare-integer-ask
    command: "declare -i count=0"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # local (tree-sitter: declaration_command)
  # ════════════════════════════════════════════════════════════════
  - id: local-var-ask
    command: "local x=1"
    expected:
      decision: ask
  - id: local-multiple-ask
    command: "local a=1 b=2"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # readonly (tree-sitter: declaration_command)
  # ════════════════════════════════════════════════════════════════
  - id: readonly-var-ask
    command: "readonly X=42"
    expected:
      decision: ask
  - id: readonly-name-only-ask
    command: "readonly FOO"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # typeset (tree-sitter: declaration_command)
  # ════════════════════════════════════════════════════════════════
  - id: typeset-var-ask
    command: "typeset -i num=5"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # unset (tree-sitter: unset_command)
  # ════════════════════════════════════════════════════════════════
  - id: unset-var-ask
    command: "unset FOO"
    expected:
      decision: ask
  - id: unset-multiple-ask
    command: "unset FOO BAR BAZ"
    expected:
      decision: ask
  - id: unset-f-ask
    command: "unset -f my_function"
    expected:
      decision: ask
  - id: unset-v-ask
    command: "unset -v MY_VAR"
    expected:
      decision: ask

  # ── unset in compound: should not poison other leaves ─────────
  - id: unset-and-echo-ask
    command: "unset FOO && echo done"
    expected:
      decision: ask
    note: "unset is ask, echo is allow → ask (not opaque/unrecognized)"

  # ════════════════════════════════════════════════════════════════
  # source / . (parsed as SimpleCommand, NOT allowlisted)
  # source/. are intentionally not in the core allowlist because
  # secrets.yaml ask rules only cover cat/less/more/head/tail/bat,
  # not source. Allowlisting source would let `source ~/.ssh/id_rsa`
  # through unchecked. See bypass-attempts.yaml for security tests.
  # ════════════════════════════════════════════════════════════════

  # ── source: defaults to ask (not allowlisted) ────────────────
  - id: source-bashrc-ask
    command: "source ~/.bashrc"
    expected:
      decision: ask
  - id: source-bash-aliases-ask
    command: "source ~/.bash_aliases"
    expected:
      decision: ask
  - id: source-cargo-env-ask
    command: "source ~/.cargo/env"
    expected:
      decision: ask
  - id: dot-bashrc-ask
    command: ". ~/.bashrc"
    expected:
      decision: ask
  - id: dot-cargo-env-ask
    command: ". ~/.cargo/env"
    expected:
      decision: ask
  - id: source-script-ask
    command: "source ./setup.sh"
    expected:
      decision: ask
  - id: dot-script-ask
    command: ". ./setup.sh"
    expected:
      decision: ask

  # ── Dangerous source: denied by rules ─────────────────────────
  - id: source-env-asks
    command: "source .env"
    expected:
      decision: ask
      rule_id: source-env
  - id: source-env-local-asks
    command: "source .env.local"
    expected:
      decision: ask
      rule_id: source-env
  - id: dot-env-asks
    command: ". .env"
    expected:
      decision: ask
      rule_id: source-env
  - id: dot-envrc-asks
    command: ". .envrc"
    expected:
      decision: ask
      rule_id: source-env

  # ════════════════════════════════════════════════════════════════
  # command (transparent wrapper — unwraps to inner command)
  # ════════════════════════════════════════════════════════════════

  # ── Positive: command + safe inner = allow ────────────────────
  - id: command-ls-allow
    command: "command ls"
    expected:
      decision: allow
  - id: command-echo-allow
    command: "command echo hello"
    expected:
      decision: allow
  - id: command-grep-allow
    command: "command grep -r pattern src/"
    expected:
      decision: allow
  - id: command-git-status-allow
    command: "command git status"
    expected:
      decision: allow
  - id: command-cat-allow
    command: "command cat README.md"
    expected:
      decision: allow

  # ── command with flags ────────────────────────────────────────
  - id: command-v-allow
    command: "command -v ls"
    expected:
      decision: allow
    note: "command -v is like which — safe"
  - id: command-V-allow
    command: "command -V ls"
    expected:
      decision: allow
  - id: command-p-allow
    command: "command -p ls"
    expected:
      decision: allow

  # ── Negative: command + dangerous inner ──────────────────────
  - id: command-rm-deny
    command: "command rm -rf /"
    expected:
      decision: deny
      rule_id: rm-recursive-root
  - id: command-cat-env-asks
    command: "command cat .env"
    expected:
      decision: ask
      rule_id: cat-env-file
  - id: command-unknown-ask
    command: "command some_unknown_command"
    expected:
      decision: ask

  # ── Edge cases ────────────────────────────────────────────────
  - id: command-bare-allow
    command: "command"
    expected:
      decision: allow
    note: "No inner command — wrapper itself is allowlisted"

  # ── Chained: command + other wrappers ─────────────────────────
  - id: command-timeout-ls-allow
    command: "command timeout 30 ls"
    expected:
      decision: allow
  - id: command-timeout-rm-deny
    command: "command timeout 30 rm -rf /"
    expected:
      decision: deny

  # ════════════════════════════════════════════════════════════════
  # builtin (transparent wrapper — unwraps to inner command)
  # ════════════════════════════════════════════════════════════════

  # ── Positive: builtin + safe inner = allow ────────────────────
  - id: builtin-echo-allow
    command: "builtin echo hello"
    expected:
      decision: allow
  - id: builtin-cd-allow
    command: "builtin cd /tmp"
    expected:
      decision: allow
  - id: builtin-type-allow
    command: "builtin type ls"
    expected:
      decision: allow

  # ── Negative: builtin + dangerous inner ───────────────────────
  - id: builtin-unknown-ask
    command: "builtin some_unknown_command"
    expected:
      decision: ask

  # ── Edge cases ────────────────────────────────────────────────
  - id: builtin-bare-allow
    command: "builtin"
    expected:
      decision: allow
    note: "No inner command — wrapper itself is allowlisted"

  # ════════════════════════════════════════════════════════════════
  # : (colon no-op). Allowlisted as a builtin. There is NO fork-bomb
  # rule: the old `command: ":"` rule flagged every benign no-op while
  # catching no real fork bomb (see filesystem.yaml + SECURITY.md). These
  # lock in that the no-op is allowed.
  # ════════════════════════════════════════════════════════════════
  - id: colon-noop-bare
    command: ":"
    expected:
      decision: allow
    note: "Shell no-op — must not be flagged as a fork bomb"
  - id: colon-noop-loop-body
    command: "for f in a b; do : ; done"
    expected:
      decision: allow
    note: "Benign no-op loop body — was a fork-bomb false positive"
  - id: colon-noop-while
    command: "while :; do sleep 1; done"
    expected:
      decision: allow
    note: "`while :` infinite-loop idiom — was a fork-bomb false positive"
  - id: colon-self-pipe
    command: ": | :"
    expected:
      decision: allow
    note: "Self-pipe of no-ops — harmless; was a fork-bomb false positive"

  # ════════════════════════════════════════════════════════════════
  # Control-flow builtins: exit / return / break / continue / set / setopt
  # Allowlisted because they only manipulate shell state and surface as
  # flattened leaves inside compound commands. Before they were allowlisted,
  # a for-loop or `set -e` preamble poisoned the whole command to ask even
  # when every real leaf was safe (observed in the audit log).
  # ════════════════════════════════════════════════════════════════

  # ── Bare / minimal ────────────────────────────────────────────
  - id: exit-bare-allow
    command: "exit"
    expected:
      decision: allow
  - id: exit-code-allow
    command: "exit 1"
    expected:
      decision: allow
  - id: return-zero-allow
    command: "return 0"
    expected:
      decision: allow
  - id: set-errexit-allow
    command: "set -e"
    expected:
      decision: allow
  - id: set-pipefail-allow
    command: "set -o pipefail"
    expected:
      decision: allow
  - id: setopt-nullglob-allow
    command: "setopt NULL_GLOB"
    expected:
      decision: allow

  # ── Realistic compound contexts that previously asked ─────────
  - id: cmd-or-exit-allow
    command: "ls /tmp || exit 1"
    expected:
      decision: allow
    note: "`cmd || exit 1` — exit no longer poisons the safe leaf"
  - id: loop-with-continue-allow
    command: 'for f in a b c; do [ "$f" = "b" ] && continue; echo "$f"; done'
    expected:
      decision: allow
    note: "for-loop with continue guard — was an ask false positive"
  - id: loop-with-break-allow
    command: "for i in 1 2 3 4 5; do echo run $i; break; done"
    expected:
      decision: allow
    note: "retry-style loop with break — was an ask false positive"
  - id: set-e-preamble-allow
    command: "set -e; echo start; ls"
    expected:
      decision: allow
    note: "`set -e` script preamble — no longer poisons safe leaves"

  # ── Guard: control-flow builtins must NOT mask a dangerous sibling ─
  - id: set-e-then-rm-root-deny
    command: "set -e && rm -rf /"
    expected:
      decision: deny
      rule_id: rm-recursive-root
    note: "Allowlisting set must not weaken the rm rule on the other leaf"
  - id: exit-after-dangerous-still-asks
    command: "cat .env || exit 1"
    expected:
      decision: ask
      rule_id: cat-env-file
    note: "exit allowlist must not lift the cat .env ask on the sibling leaf"
