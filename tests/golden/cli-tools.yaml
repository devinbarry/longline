tests:
  # ════════════════════════════════════════════════════════════════
  # git-cliff: stdout-only invocations allowed
  # (allowlisted in rules/cli-tools.yaml)
  # ════════════════════════════════════════════════════════════════
  # Positive tests (should allow - output to stdout)
  - id: git-cliff-unreleased-safe
    command: "git-cliff --unreleased"
    expected:
      decision: allow
  - id: git-cliff-latest-safe
    command: "git-cliff --latest"
    expected:
      decision: allow
  - id: git-cliff-current-safe
    command: "git-cliff --current"
    expected:
      decision: allow

  - id: git-cliff-bare-safe
    command: "git-cliff"
    expected:
      decision: allow

  # Negative tests (should ask - writes files or other operations)
  - id: git-cliff-output-ask
    command: "git-cliff -o CHANGELOG.md"
    expected:
      decision: ask
  - id: git-cliff-output-long-ask
    command: "git-cliff --output CHANGELOG.md"
    expected:
      decision: ask
  - id: git-cliff-output-equals-ask
    command: "git-cliff --output=CHANGELOG.md"
    expected:
      decision: ask
  - id: git-cliff-output-short-attached-ask
    command: "git-cliff -oCHANGELOG.md"
    expected:
      decision: ask
  - id: git-cliff-tag-ask
    command: "git-cliff --tag v1.0.0"
    expected:
      decision: ask
  - id: git-cliff-tag-equals-ask
    command: "git-cliff --tag=v1.0.0"
    expected:
      decision: ask
  - id: git-cliff-init-ask
    command: "git-cliff --init"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # pfp (Prefect Pipeline CLI): read-only invocations allowed
  # (allowlisted in rules/cli-tools.yaml)
  # ════════════════════════════════════════════════════════════════
  # Positive tests (should allow - read-only)
  - id: pfp-ls-safe
    command: "pfp ls"
    expected:
      decision: allow
  - id: pfp-ls-json-safe
    command: "pfp ls --json"
    expected:
      decision: allow
  - id: pfp-list-safe
    command: "pfp list"
    expected:
      decision: allow
  - id: pfp-runs-safe
    command: "pfp runs happy-t"
    expected:
      decision: allow
  - id: pfp-runs-json-safe
    command: "pfp runs happy-t --json"
    expected:
      decision: allow
  - id: pfp-logs-safe
    command: "pfp logs e130c152-db01-428a-9698-e8404cd2c5d3"
    expected:
      decision: allow
  - id: pfp-logs-short-id-safe
    command: "pfp logs e130c152"
    expected:
      decision: allow
  - id: pfp-help-safe
    command: "pfp --help"
    expected:
      decision: allow
  - id: pfp-help-short-safe
    command: "pfp -h"
    expected:
      decision: allow
  - id: pfp-version-safe
    command: "pfp --version"
    expected:
      decision: allow
  - id: pfp-run-help-safe
    command: "pfp run --help"
    expected:
      decision: allow
  - id: pfp-run-help-short-safe
    command: "pfp run -h"
    expected:
      decision: allow
  # Mutating operations (should ask at standard trust, require full trust)
  - id: pfp-run-ask
    command: "pfp run deploy"
    expected:
      decision: ask
  - id: pfp-run-with-set-flags-still-asks
    command: "pfp run pve_acme/pve-acme-prod --set config.connectivity_check=true"
    expected:
      decision: ask
  - id: pfp-run-deployment-then-help-flag-still-asks
    command: "pfp run somedeployment --help"
    expected:
      decision: ask
  - id: pfp-run-help-chained-with-dangerous-command-denies
    command: "pfp run --help; rm -rf /"
    expected:
      decision: deny
      rule_id: rm-recursive-root
  - id: pfp-pause-ask
    command: "pfp pause abc123"
    expected:
      decision: ask
  - id: pfp-resume-ask
    command: "pfp resume abc123"
    expected:
      decision: ask
  - id: pfp-cancel-ask
    command: "pfp cancel abc123"
    expected:
      decision: ask
  # Negative tests (should ask - bare or unknown)
  - id: pfp-bare-ask
    command: "pfp"
    expected:
      decision: ask
  - id: pfp-unknown-ask
    command: "pfp unknown-command"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # chezmoi: read-only subcommands allowed
  # (allowlisted in rules/cli-tools.yaml)
  # ════════════════════════════════════════════════════════════════
  # Positive tests (read-only inspection — should allow)
  - id: chezmoi-version-safe
    command: "chezmoi --version"
    expected:
      decision: allow
  - id: chezmoi-help-safe
    command: "chezmoi --help"
    expected:
      decision: allow
  - id: chezmoi-managed-safe
    command: "chezmoi managed"
    expected:
      decision: allow
  - id: chezmoi-managed-with-args-safe
    command: "chezmoi managed ~/.claude/skills/babysit/"
    expected:
      decision: allow
  - id: chezmoi-unmanaged-safe
    command: "chezmoi unmanaged"
    expected:
      decision: allow
  - id: chezmoi-list-safe
    command: "chezmoi list"
    expected:
      decision: allow
  - id: chezmoi-status-safe
    command: "chezmoi status"
    expected:
      decision: allow
  - id: chezmoi-diff-safe
    command: "chezmoi diff"
    expected:
      decision: allow
  - id: chezmoi-diff-path-safe
    command: "chezmoi diff ~/.zshrc"
    expected:
      decision: allow
  - id: chezmoi-cat-safe
    command: "chezmoi cat ~/.zshrc"
    expected:
      decision: allow
  - id: chezmoi-cat-config-safe
    command: "chezmoi cat-config"
    expected:
      decision: allow
  - id: chezmoi-data-safe
    command: "chezmoi data"
    expected:
      decision: allow
  - id: chezmoi-doctor-safe
    command: "chezmoi doctor"
    expected:
      decision: allow
  - id: chezmoi-dump-safe
    command: "chezmoi dump"
    expected:
      decision: allow
  - id: chezmoi-dump-config-safe
    command: "chezmoi dump-config"
    expected:
      decision: allow
  - id: chezmoi-source-path-safe
    command: "chezmoi source-path"
    expected:
      decision: allow
  - id: chezmoi-target-path-safe
    command: "chezmoi target-path"
    expected:
      decision: allow
  - id: chezmoi-verify-safe
    command: "chezmoi verify"
    expected:
      decision: allow
  - id: chezmoi-execute-template-safe
    command: "chezmoi execute-template '{{ .chezmoi.os }}'"
    expected:
      decision: allow
  # Common pipeline use (read-only stage piped to allowlisted filters)
  - id: chezmoi-managed-grep-pipe-safe
    command: "chezmoi managed | grep -i claude"
    expected:
      decision: allow
  - id: chezmoi-diff-head-pipe-safe
    command: "chezmoi diff | head -50"
    expected:
      decision: allow

  # Negative tests (mutating subcommands — should ask)
  - id: chezmoi-bare-ask
    command: "chezmoi"
    expected:
      decision: ask
  - id: chezmoi-apply-ask
    command: "chezmoi apply"
    expected:
      decision: ask
  - id: chezmoi-init-ask
    command: "chezmoi init"
    expected:
      decision: ask
  - id: chezmoi-add-ask
    command: "chezmoi add ~/.zshrc"
    expected:
      decision: ask
  - id: chezmoi-edit-ask
    command: "chezmoi edit ~/.zshrc"
    expected:
      decision: ask
  - id: chezmoi-update-ask
    command: "chezmoi update"
    expected:
      decision: ask
  - id: chezmoi-forget-ask
    command: "chezmoi forget ~/.zshrc"
    expected:
      decision: ask
  - id: chezmoi-re-add-ask
    command: "chezmoi re-add"
    expected:
      decision: ask
  - id: chezmoi-merge-ask
    command: "chezmoi merge ~/.zshrc"
    expected:
      decision: ask
  - id: chezmoi-import-ask
    command: "chezmoi import dotfiles.tar.gz"
    expected:
      decision: ask
  - id: chezmoi-purge-ask
    command: "chezmoi purge"
    expected:
      decision: ask
  - id: chezmoi-upgrade-ask
    command: "chezmoi upgrade"
    expected:
      decision: ask
  - id: chezmoi-state-ask
    command: "chezmoi state delete-bucket --bucket=entryState"
    expected:
      decision: ask
  - id: chezmoi-secret-ask
    command: "chezmoi secret keyring set --service test --user me"
    expected:
      decision: ask
  - id: chezmoi-edit-config-ask
    command: "chezmoi edit-config"
    expected:
      decision: ask
  - id: chezmoi-unknown-ask
    command: "chezmoi some-future-subcommand"
    expected:
      decision: ask
