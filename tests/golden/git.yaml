  # --exec=<cmd> was already denied; the space form was intentionally
  # excluded from git-transport-program-flags-spaceform because
  # `git rebase --exec "cmd"` is a legitimate (already-ask-gated) flow.
  # New rule scopes the space-form --exec deny to `git archive`. ---
  - id: git-archive-exec-spaceform-deny
    command: "git archive --remote=. --exec sh HEAD"
    expected:
      decision: deny
      rule_id: git-archive-exec-spaceform
  - id: git-archive-exec-joinedform-deny
    command: "git archive --remote=. --exec=sh HEAD"
    expected:
      decision: deny
      rule_id: git-transport-program-flags

