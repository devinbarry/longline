    command: "git symbolic-ref HEAD"
    expected:
      decision: allow
    # Read-only: shows what ref HEAD points to
  - id: git-symbolic-ref-delete-dangerous
    command: "git symbolic-ref --delete HEAD"
    expected:
      decision: ask
      rule_id: git-symbolic-ref-delete
    # Destructive operation - removes symbolic references
  - id: git-symbolic-ref-short-safe
    command: "git symbolic-ref --short HEAD"
    expected:
      decision: allow
    # Read-only: shows branch name without refs/heads/ prefix
  - id: git-symbolic-ref-quiet
    command: "git symbolic-ref -q HEAD"
    expected:
      decision: allow
    # Read-only: quiet mode, no error if not symbolic ref

  # --- git show-ref (read-only) ---
  - id: git-show-ref-basic
    command: "git show-ref"
    expected:
      decision: allow
    # Read-only: lists all refs
  - id: git-show-ref-heads
    command: "git show-ref --heads"
    expected:
      decision: allow
    # Read-only: lists branch refs only
  - id: git-show-ref-tags
    command: "git show-ref --tags"
    expected:
      decision: allow
    # Read-only: lists tag refs only
  - id: git-show-ref-verify
    command: "git show-ref --verify refs/heads/main"
    expected:
      decision: allow
    # Read-only: verifies a specific ref exists

  # --- git diff-tree (read-only plumbing) ---
  - id: git-diff-tree-basic
    command: "git diff-tree --no-commit-id -r HEAD"
    expected:
      decision: allow
    # Read-only: shows changes in a commit
  - id: git-diff-tree-name-status
    command: "git diff-tree --no-commit-id -r --name-status c4f7087"
    expected:
      decision: allow
    # Read-only: shows file changes with status letters
  - id: git-diff-tree-range
    command: "git diff-tree --no-commit-id -r --name-status f933d86..c4f7087"
    expected:
      decision: allow
    # Read-only: shows changes between two commits

  # --- git -C flag (allowlist matches once -C is stripped) ---
  - id: git-C-status-allow
    command: "git -C /tmp status"
    expected:
      decision: allow
    # Safe command with -C flag
  - id: git-C-reset-hard-ask
    command: "git -C /tmp reset --hard"
    expected:
      decision: ask
      rule_id: git-reset-hard
    # Destructive command with -C flag, rule still fires
  - id: git-C-clean-f-ask
    command: "git -C /tmp clean -f"
    expected:
      decision: ask
      rule_id: git-clean-force
    # Destructive command with -C flag, rule still fires
  - id: git-C-rebase-ask
    command: "git -C /tmp rebase main"
    expected:
      decision: ask
      rule_id: git-rebase
    # Destructive command with -C flag, rule still fires
  - id: git-C-push-force-ask
    command: "git -C /tmp push --force origin main"
    expected:
      decision: ask
      rule_id: git-force-push-main
    # Force push with -C flag, rule still fires

  # --- git combined short flags (should still match rules) ---
  - id: git-clean-ffd-ask
    command: "git clean -ffd"
    expected:
      decision: ask
      rule_id: git-clean-force
    # Combined flags contain -f
  - id: git-clean-ffdx-ask
    command: "git clean -ffdx"
    expected:
      decision: ask
      rule_id: git-clean-force
    # Combined flags contain -f
  - id: git-clean-xdf-ask
    command: "git clean -xdf"
    expected:
      decision: ask
      rule_id: git-clean-force
    # Common combined flags ordering still contains -f

  # --- git subcommands that execute arbitrary shell / rewrite refs ---
  - id: git-submodule-foreach-ask
    command: "git submodule foreach 'rm -rf /'"
    expected:
      decision: ask
    # Runs an arbitrary command per-submodule; should never be allowlisted
  - id: git-alias-shell-deny
    command: "git -c alias.x='!rm -rf /' x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
    # Git aliases with `!` execute a shell command per-invocation
  - id: git-update-ref-delete-main-deny
    command: "git update-ref -d refs/heads/main"
    expected:
      decision: deny
      rule_id: git-update-ref-protected
    # Deleting main branch ref is denied (protected ref)
  - id: git-filter-branch-deny
    command: "git filter-branch -- --all"
    expected:
      decision: deny
      rule_id: git-filter-branch
    # History rewriting; denied
  - id: git-filter-repo-deny
    command: "git filter-repo --force"
    expected:
      decision: deny
      rule_id: git-filter-repo
    # History rewriting via subcommand form
  - id: git-filter-repo-direct-deny
    command: "git-filter-repo --force"
    expected:
      decision: deny
      rule_id: git-filter-repo-direct
    # History rewriting via direct executable form
  - id: git-replace-deny
    command: "git replace --edit abc1234"
    expected:
      decision: deny
      rule_id: git-replace
    # Manipulates the commit graph
  - id: git-replace-graft-deny
    command: "git replace --graft abc1234 def5678"
    expected:
      decision: deny
      rule_id: git-replace

  # ── git reset: NOT allowlisted (asks with a clear message) ─────────
  # `git reset` is intentionally not allowlisted. SAFETY REGRESSION GUARD:
  # an earlier attempt to allowlist soft/mixed opened a hole — git accepts
  # abbreviated flags (`git reset --h` == `--hard`) and the args matcher is
  # bag-of-words, so a naive `git reset` allowlist entry let destructive
  # `git reset --h` / `--ha` / `--me` / `--k` resets slip through to ALLOW.
  # These cases lock that shut: every git reset form must ask. If someone
  # re-allowlists `git reset` without modelling abbreviated modes, the
  # abbreviation cases below flip to allow and fail. See SECURITY.md and the
  # NOTE on the git reset entry in rules/git.yaml.
  - id: git-reset-soft-asks
    command: "git reset --soft HEAD~1"
    expected:
      decision: ask
    note: "Not allowlisted — asks with 'git reset isn't on longline's allowlist' (see ask_reason_regressions)"
  - id: git-reset-mixed-asks
    command: "git reset --mixed HEAD~1"
    expected:
      decision: ask
  - id: git-reset-bare-asks
    command: "git reset"
    expected:
      decision: ask
  - id: git-reset-hard-asks
    command: "git reset --hard HEAD~1"
    expected:
      decision: ask
      rule_id: git-reset-hard
    note: "Falsifiable: the git-reset-hard rule names this destructive mode"
  # --- abbreviated-mode hole: these MUST ask (regression guard) ---
  - id: git-reset-hard-abbrev-h-asks
    command: "git reset --h HEAD~1"
    expected:
      decision: ask
    note: "REGRESSION GUARD: `--h` is git's abbreviation for --hard (destructive). Must never allow."
  - id: git-reset-hard-abbrev-ha-asks
    command: "git reset --ha HEAD~1"
    expected:
      decision: ask
  - id: git-reset-merge-abbrev-me-asks
    command: "git reset --me HEAD~1"
    expected:
      decision: ask
    note: "REGRESSION GUARD: `--me` abbreviates --merge (rewrites working tree)."
  - id: git-reset-keep-abbrev-k-asks
    command: "git reset --k HEAD~1"
    expected:
      decision: ask
    note: "REGRESSION GUARD: `--k` abbreviates --keep (rewrites working tree)."
  - id: git-reset-soft-then-hard-abbrev-asks
    command: "git reset --soft --h HEAD~1"
    expected:
      decision: ask
    note: "REGRESSION GUARD: a safe-mode literal followed by an abbreviated --hard still performs a hard reset; must ask."

  # ── git checkout: branch-switch path (allowlisted, was untested) ──
  - id: git-checkout-branch-allow
    command: "git checkout main"
    expected:
      decision: allow
  - id: git-checkout-new-branch-allow
    command: "git checkout -b feature/x"
    expected:
      decision: allow

  # ============================================================
  # 20. SUBCOMMAND-PINNED DESTRUCTIVE FLAG GATING (2026-05-30)
  #     New `args.subcommand` matcher + abbreviation-aware force
  #     flags. See docs/plans/2026-05-30-git-destructive-flag-gating.
  # ============================================================

  # --- checkout --force / -f / -B (discard / force-overwrite) ---
  - id: git-checkout-force-long-asks
    command: "git checkout --force feature"
    expected: { decision: ask, rule_id: git-checkout-force-abbrev }
  - id: git-checkout-force-f-asks
    command: "git checkout -f feature"
    expected: { decision: ask, rule_id: git-checkout-force-short }
  - id: git-checkout-force-abbrev-fo-asks
    command: "git checkout --fo feature"
    expected: { decision: ask, rule_id: git-checkout-force-abbrev }
  - id: git-checkout-force-abbrev-f-asks
    command: "git checkout --f feature"
    expected: { decision: ask, rule_id: git-checkout-force-abbrev }
    note: "git accepts --f as the unambiguous abbreviation of --force on checkout."
  - id: git-checkout-force-create-B-asks
    command: "git checkout -B feature main"
    expected: { decision: ask, rule_id: git-checkout-force-short }
  - id: git-checkout-ours-out-of-scope-allow
    command: "git checkout --ours path/to/file"
    expected: { decision: allow }
    note: "Documented non-goal: --ours/--theirs (deliberate conflict resolution) is NOT gated. Locks the scope decision."
  - id: git-checkout-theirs-out-of-scope-allow
    command: "git checkout --theirs path/to/file"
    expected: { decision: allow }

  # --- global-flag strip: subcommand survives `git -C` / abs path / $VAR ---
  - id: git-C-checkout-force-asks
    command: "git -C /repo checkout --force feature"
    expected: { decision: ask }
    note: "Subcommand pin survives a literal `git -C <path>` global."
  - id: git-abspath-checkout-force-asks
    command: "/usr/bin/git -C /repo checkout --force feature"
    expected: { decision: ask }
    note: "Resolver basename-normalizes before git-family detection (R2 P0)."
  - id: git-var-checkout-force-asks
    command: "git -C \"$REPO\" checkout --force feature"
    expected: { decision: ask }
    note: "Gate-biased: `-C $VAR` is an UnsafeString global -> Ambiguous -> matches any pin (over-ask). Reason may not name checkout precisely; asking is the point."

  # --- branch force ops (delete/move/copy/create), `--for` guard ---
  - id: git-branch-force-delete-D-asks
    command: "git branch -D feature"
    expected: { decision: ask, rule_id: git-branch-delete-force }
  - id: git-branch-delete-force-long-asks
    command: "git branch --delete --force feature"
    expected: { decision: ask, rule_id: git-branch-delete-force }
  - id: git-branch-force-move-M-asks
    command: "git branch -M old new"
    expected: { decision: ask, rule_id: git-branch-delete-force }
  - id: git-branch-force-copy-C-asks
    command: "git branch -C old new"
    expected: { decision: ask, rule_id: git-branch-delete-force }
  - id: git-branch-force-create-asks
    command: "git branch -f feature main"
    expected: { decision: ask, rule_id: git-branch-delete-force }
  - id: git-branch-df-combined-short-asks
    command: "git branch -df feature"
    expected: { decision: ask, rule_id: git-branch-delete-force }
    note: "Combined short -df contains -f (force)."
  - id: git-branch-safe-delete-merged-allow
    command: "git branch -d feature"
    expected: { decision: allow }
    note: "Non-force merged-delete stays allow (no force flag)."
  - id: git-branch-safe-rename-allow
    command: "git branch -m old new"
    expected: { decision: allow }
  - id: git-branch-format-allow
    command: "git branch --format='%(refname)'"
    expected: { decision: allow }
    note: "FALSIFIABLE GUARD: --format starts with --for; must NOT be gated (R1 P0-2). `--for` is deliberately not a force prefix on branch."
  - id: git-branch-list-all-allow
    command: "git branch -a"
    expected: { decision: allow }

  # --- pull --force: --fo abbrev (not --f, which collides with --ff-only) ---
  - id: git-pull-force-fo-asks
    command: "git pull --fo"
    expected: { decision: ask, rule_id: git-pull-force-abbrev }
  - id: git-pull-force-forc-asks
    command: "git pull --forc origin main"
    expected: { decision: ask, rule_id: git-pull-force-abbrev }
  - id: git-pull-force-f-asks
    command: "git pull -f"
    expected: { decision: ask, rule_id: git-pull-force-short }
  - id: git-pull-plain-allow
    command: "git pull origin main"
    expected: { decision: allow }
  - id: git-pull-ff-only-allow
    command: "git pull --ff-only"
    expected: { decision: allow }
    note: "FALSIFIABLE GUARD: --ff-only must NOT match the force gate (R2 P1). This is why pull uses --fo not --f."
  - id: git-pull-no-ff-allow
    command: "git pull --no-ff"
    expected: { decision: allow }
  - id: git-pull-force-main-reason-flip
    command: "git pull --force origin main"
    expected: { decision: ask, rule_id: git-pull-force-abbrev }
    note: "REASON-FLIP GUARD (R3 P2-1): used to mislabel as git-force-push-main; now correctly a pull-force, pinned to subcommand pull."

  # --- switch force / -C / --discard-changes (closes the switch bypass) ---
  - id: git-switch-force-asks
    command: "git switch --force topic"
    expected: { decision: ask, rule_id: git-switch-force-abbrev }
  - id: git-switch-force-create-C-asks
    command: "git switch -C topic"
    expected: { decision: ask, rule_id: git-switch-force-short }
  - id: git-switch-discard-asks
    command: "git switch --discard-changes topic"
    expected: { decision: ask, rule_id: git-switch-force-abbrev }
  - id: git-switch-force-f-asks
    command: "git switch -f topic"
    expected: { decision: ask, rule_id: git-switch-force-short }
  - id: git-switch-plain-allow
    command: "git switch topic"
    expected: { decision: allow }
  - id: git-switch-detach-allow
    command: "git switch --detach HEAD"
    expected: { decision: allow }
    note: "GUARD: --detach (--det) must NOT match --discard-changes (--disc)."

  # --- bag-of-words falsifiable partners (one per pinned subcommand) ---
  # Each is allowlisted (git log/show/commit) and must stay allow: proves the
  # subcommand pin defeats the old bag-of-words false-match.
  - id: git-bow-checkout-allow
    command: "git log --grep checkout --format=oneline"
    expected: { decision: allow }
    note: "FALSIFIABLE: 'checkout' as a --grep value must not fire the checkout-force pin."
  - id: git-bow-reset-hard-allow
    command: "git log --grep reset --hard"
    expected: { decision: allow }
    note: "FALSIFIABLE (R3 P1-2): pre-pin this wrongly fired git-reset-hard via bag-of-words on --hard; the subcommand:reset pin flips it to allow. Uniquely isolates the pin."
  - id: git-bow-push-allow
    command: "git log --grep push --format=full"
    expected: { decision: allow }
    note: "FALSIFIABLE: 'push' as a --grep value must not fire the force-push pin."
  - id: git-bow-pull-allow
    command: "git show --format='%H pull'"
    expected: { decision: allow }
  - id: git-bow-commit-msg-allow
    command: "git commit -m \"push --force\""
    expected: { decision: allow }
    note: "FALSIFIABLE: a commit message mentioning 'push --force' must not fire force-push rules."

  # --- push force ops (require full trust; otherwise push asks anyway) ---
  - id: git-push-force-for-abbrev-asks
    overlay: |
      override_trust_level: full
    command: "git push --for"
    expected: { decision: ask, rule_id: git-force-push-abbrev }
  - id: git-push-force-with-lease-asks
    overlay: |
      override_trust_level: full
    command: "git push --force-with-lease origin feature"
    expected: { decision: ask, rule_id: git-force-push-abbrev }
  - id: git-push-force-with-lease-refspec-asks
    overlay: |
      override_trust_level: full
    command: "git push --force-with-lease=origin/main origin feature"
    expected: { decision: ask, rule_id: git-force-push-abbrev }
  - id: git-push-delete-pinned-asks
    overlay: |
      override_trust_level: full
    command: "git push --delete origin feature"
    expected: { decision: ask, rule_id: git-push-delete }
  - id: git-push-plus-refspec-asks
    overlay: |
      override_trust_level: full
    command: "git push origin +main"
    expected: { decision: ask, rule_id: git-force-push-plus }
  - id: git-push-plus-slash-refspec-asks
    overlay: |
      override_trust_level: full
    command: "git push origin +refs/heads/main"
    expected: { decision: ask, rule_id: git-force-push-plus }
    note: "Slash refspec needs +** (the glob * does not cross /); R2 P0-2."
  - id: git-push-follow-tags-allow
    overlay: |
      override_trust_level: full
    command: "git push --follow-tags"
    expected: { decision: allow }
    note: "FALSIFIABLE GUARD: --follow-tags (--fol) must NOT match the force gate (--for). This eliminates the over-ask R1 was willing to accept."
  - id: git-push-plain-full-trust-allow
    overlay: |
      override_trust_level: full
    command: "git push origin main"
    expected: { decision: allow }

  # --- git -C <path> <subcmd>: global -C must NOT read as a subcommand force
  #     flag (regression: `git -C` is used constantly and must stay allow) ---
  - id: git-C-branch-list-allow
    command: "git -C /repo branch --list"
    expected: { decision: allow }
    note: "REGRESSION GUARD: the global -C must not be counted as branch's force-copy -C. git -C <path> is extremely common and must stay allow."
  - id: git-C-branch-all-allow
    command: "git -C /repo branch -a"
    expected: { decision: allow }
  - id: git-C-switch-plain-allow
    command: "git -C /repo switch topic"
    expected: { decision: allow }
    note: "REGRESSION GUARD: global -C must not read as switch's force-create -C."
  - id: git-C-checkout-branch-allow
    command: "git -C /repo checkout main"
    expected: { decision: allow }
  - id: git-abspath-C-status-allow
    command: "/usr/bin/git -C /repo status"
    expected: { decision: allow }
    note: "REGRESSION GUARD: absolute-path git -C must basename-normalize before global-strip in effective_argv, else safe abs-path `git -C` falls through to ask."
  - id: git-C-status-repo-allow
    command: "git -C /repo status"
    expected: { decision: allow }
  # Valid Git globals outside longline's reviewed safety subset deliberately
  # stay fail-closed until their operand semantics are modelled.
  - id: git-unreviewed-exec-path-global-ask
    command: "git --exec-path=/tmp status"
    expected: { decision: ask }
  - id: git-unreviewed-list-cmds-global-ask
    command: "git --list-cmds=builtins status"
    expected: { decision: ask }
  - id: git-unreviewed-attr-source-global-ask
    command: "git --attr-source=HEAD status"
    expected: { decision: ask }
  # Genuine destructive flags AFTER the subcommand are still gated under -C:
  - id: git-C-branch-D-asks
    command: "git -C /repo branch -D feature"
    expected: { decision: ask, rule_id: git-branch-delete-force }
  - id: git-C-branch-force-copy-asks
    command: "git -C /repo branch -C old new"
    expected: { decision: ask, rule_id: git-branch-delete-force }
    note: "The branch's own -C (force-copy, after the subcommand) IS gated; only the leading global -C is ignored."
  - id: git-C-switch-force-asks
    command: "git -C /repo switch --force topic"
    expected: { decision: ask, rule_id: git-switch-force-abbrev }
