# ============================================================
# GIT GOLDEN TESTS - Comprehensive git command coverage
# ============================================================
#
# Organization:
#   1. Core read-only commands (always safe)
#   2. Staging and committing
#   3. Branch operations
#   4. Remote operations
#   5. Tag operations
#   6. Stash operations
#   7. History rewriting (reset, clean, revert)
#   8. Config modification
#   9. Worktree operations
#   10. Reflog operations
#   11. GC operations
#   12. Bisect operations
#   13. File operations (mv, rm, grep)
#   14. Archive operations
#   15. Repository setup (clone, init)
#   16. Merge and cherry-pick
#   17. Force push (always ask)
#   18. Rebase (representative tests - see git-rebase.yaml for comprehensive coverage)
#   19. Special cases (symbolic-ref)
#
# ============================================================

tests:

  # ============================================================
  # Safe ephemeral editor suppression (v0.21)
  # ============================================================

  # Exact, statically known `true` is transparent to the editor-channel
  # guard; the underlying Git operation still determines the outcome.
  - id: git-editor-noop-env-status-allow
    command: "GIT_EDITOR=true git status"
    expected: { decision: allow }
  - id: git-sequence-editor-noop-env-status-allow
    command: "GIT_SEQUENCE_EDITOR=true git status"
    expected: { decision: allow }
  - id: git-sequence-editor-vim-env-status-deny
    command: "GIT_SEQUENCE_EDITOR=vim git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: editor-noop-env-status-allow
    command: "EDITOR=true git status"
    expected: { decision: allow }
  - id: visual-noop-env-status-allow
    command: "VISUAL=true git status"
    expected: { decision: allow }
  - id: git-editor-noop-env-single-quoted-status-allow
    command: "GIT_EDITOR='true' git status"
    expected: { decision: allow }
  - id: git-editor-noop-env-double-quoted-status-allow
    command: 'GIT_EDITOR="true" git status'
    expected: { decision: allow }
  - id: git-editor-noop-env-rebase-still-asks
    command: "GIT_EDITOR=true git rebase --continue"
    expected: { decision: ask, rule_id: git-rebase }
  - id: git-sequence-editor-noop-env-interactive-rebase-still-asks
    command: "GIT_SEQUENCE_EDITOR=true git rebase -i HEAD~3"
    expected: { decision: ask, rule_id: git-rebase }

  - id: git-c-core-editor-noop-status-allow
    command: "git -c core.editor=true status"
    expected: { decision: allow }
  - id: git-c-sequence-editor-noop-status-allow
    command: "git -c sequence.editor=true status"
    expected: { decision: allow }
  - id: git-c-core-editor-noop-rebase-still-asks
    command: "git -c core.editor=true rebase --continue"
    expected: { decision: ask, rule_id: git-rebase }
  - id: git-c-sequence-editor-noop-rebase-still-asks
    command: "git -c sequence.editor=true rebase --continue"
    expected: { decision: ask, rule_id: git-rebase }
  - id: git-c-editor-noop-case-insensitive-key-allow
    command: "git -c CORE.EDITOR=true status"
    expected: { decision: allow }
  - id: git-c-editor-noop-whole-token-single-quoted-allow
    command: "git -c 'core.editor=true' status"
    expected: { decision: allow }
  - id: git-c-editor-noop-whole-token-double-quoted-allow
    command: 'git -c "core.editor=true" status'
    expected: { decision: allow }
  - id: git-c-editor-noop-absolute-git-allow
    command: "/usr/bin/git -c core.editor=true status"
    expected: { decision: allow }
  - id: git-c-editor-noop-leading-C-allow
    command: "git -C /repo -c core.editor=true status"
    expected: { decision: allow }

  # Wrapper propagation preserves assignment provenance. Whole-token quoted
  # `NAME=true` is static; RHS-only quote concatenation is conservative.
  - id: env-wrapper-editor-noop-allow
    command: "env GIT_EDITOR=true git status"
    expected: { decision: allow }
  - id: env-wrapper-whole-token-quoted-editor-noop-allow
    command: "env 'GIT_EDITOR=true' git status"
    expected: { decision: allow }
  - id: env-wrapper-rhs-quoted-editor-noop-deny
    command: "env GIT_EDITOR='true' git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: env-wrapper-editor-vim-deny
    command: "env EDITOR=vim git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: env-wrapper-visual-code-deny
    command: "env VISUAL=code git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: timeout-wrapper-editor-noop-allow
    command: "timeout 30 GIT_EDITOR=true git status"
    expected: { decision: allow }
  - id: command-wrapper-editor-noop-allow
    command: "command GIT_EDITOR=true git status"
    expected: { decision: allow }

  # Every non-exact, dynamic, or ambiguous editor program stays restrictive.
  - id: git-editor-vim-deny
    command: "GIT_EDITOR=vim git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-path-deny
    command: "GIT_EDITOR=/tmp/evil git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-expanded-deny
    command: 'GIT_EDITOR="$EDITOR" git status'
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: editor-vim-git-deny
    command: "EDITOR=vim git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: visual-code-git-deny
    command: "VISUAL=code git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: lowercase-git-editor-noop-does-not-qualify
    command: "git_editor=true git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-uppercase-true-deny
    command: "GIT_EDITOR=TRUE git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-bin-true-deny
    command: "GIT_EDITOR=/bin/true git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-true-with-arg-deny
    command: "GIT_EDITOR='true --help' git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-empty-deny
    command: "GIT_EDITOR= git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-command-substitution-deny
    command: 'GIT_EDITOR="$(printf true)" git status'
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-literal-concatenation-deny
    command: "GIT_EDITOR='tr''ue' git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-editor-backslash-escape-deny
    command: 'GIT_EDITOR=tr\ue git status'
    expected: { decision: deny, rule_id: git-env-rce-vars }

  - id: git-c-editor-vim-deny-new-rule
    command: "git -c core.editor=vim status"
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-sequence-editor-vim-deny-new-rule
    command: "git -c sequence.editor=vim status"
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-editor-implicit-empty-deny
    command: "git -c core.editor status"
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-editor-expanded-deny-new-rule
    command: 'git -c "core.editor=$EDITOR" status'
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-editor-literal-concatenation-deny
    command: "git -c core.editor='tr''ue' status"
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-editor-backslash-escape-deny
    command: 'git -c core.editor=tr\ue status'
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-editor-uppercase-value-deny
    command: "git -c core.editor=TRUE status"
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-editor-dynamic-key-asks
    command: 'git -c "$KEY=true" status'
    expected: { decision: ask }
  - id: git-c-editor-invalid-joined-safe-asks
    command: "git -ccore.editor=true status"
    expected: { decision: ask }
  - id: git-c-editor-invalid-joined-unsafe-asks
    command: "git -ccore.editor=vim status"
    expected: { decision: ask }

  # Same-candidate exception semantics and most-restrictive-wins.
  - id: git-env-safe-editor-dangerous-sibling-deny
    command: "GIT_EDITOR=true GIT_SSH_COMMAND=evil git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-env-safe-then-unsafe-duplicate-deny
    command: "GIT_EDITOR=true GIT_EDITOR=vim git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-env-unsafe-then-safe-duplicate-deny
    command: "GIT_EDITOR=vim GIT_EDITOR=true git status"
    expected: { decision: deny, rule_id: git-env-rce-vars }
  - id: git-c-safe-then-unsafe-editor-duplicate-deny
    command: "git -c core.editor=true -c core.editor=vim status"
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-unsafe-then-safe-editor-duplicate-deny
    command: "git -c core.editor=vim -c core.editor=true status"
    expected: { decision: deny, rule_id: git-c-editor-program }
  - id: git-c-safe-editor-dangerous-sibling-deny
    command: "git -c core.editor=true -c core.sshCommand=evil status"
    expected: { decision: deny, rule_id: git-c-rce-keys }
  - id: git-c-dangerous-sibling-safe-editor-deny
    command: "git -c core.sshCommand=evil -c core.editor=true status"
    expected: { decision: deny, rule_id: git-c-rce-keys }

  # Ephemeral CLI -c is the only config-channel exception. Persistent config,
  # --config-env indirection, destructive config edit, and post-subcommand
  # editor-looking tokens remain unchanged.
  - id: git-config-env-editor-space-deny
    command: "git --config-env core.editor=EDITOR status"
    expected: { decision: deny, rule_id: git-config-env-spaceform }
  - id: git-config-env-editor-joined-deny
    command: "git --config-env=core.editor=EDITOR status"
    expected: { decision: deny, rule_id: git-c-rce-keys }
  - id: git-config-persistent-editor-set-deny
    command: "git config core.editor true"
    expected: { decision: deny, rule_id: git-config-rce-keys-spaceform }
  - id: git-c-safe-editor-config-edit-still-deny
    command: "git -c core.editor=true config --edit"
    expected: { decision: deny }
    note: "The existing raw-argv persistent-config matcher may win deny attribution over git-config-edit; either deny preserves the authorization boundary."
  - id: git-log-editor-token-after-subcommand-allow
    command: "git log --grep core.editor=true"
    expected: { decision: allow }
  - id: git-status-editor-token-after-subcommand-allow
    command: "git status core.editor=true"
    expected: { decision: allow }

  # Compound forms preserve each leaf's normal decision. The documented
  # find/xargs bare-assignment extraction gap remains fail-closed at ask.
  - id: git-editor-noop-pipeline-allow
    command: "GIT_EDITOR=true git status | grep clean"
    expected: { decision: allow }
  - id: git-editor-noop-list-rebase-asks
    command: "GIT_EDITOR=true git status; git rebase --continue"
    expected: { decision: ask, rule_id: git-rebase }
  - id: git-editor-unsafe-outer-shell-c-asks
    command: "GIT_EDITOR=vim bash -c 'git status'"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: find-exec-bare-editor-assignment-gap-asks
    command: "find . -exec GIT_EDITOR=true git status \\;"
    expected: { decision: ask }
  - id: xargs-bare-editor-assignment-gap-asks
    command: "printf x | xargs GIT_EDITOR=true git status"
    expected: { decision: ask }

  # Disabling the legacy broad RCE-key rule no longer disables the dedicated
  # editor-channel protection.
  - id: git-c-editor-rule-independent-of-legacy-disable
    overlay: |
      disable_rules: [git-c-rce-keys]
    command: "git -c core.editor=vim status"
    expected: { decision: deny, rule_id: git-c-editor-program }

  # Disabling the Git-specific env deny leaves R11's command-agnostic ask in
  # place for unsafe editor programs, while exact static `true` stays clear.
  - id: git-editor-unsafe-r11-fallback-when-env-rule-disabled
    overlay: |
      disable_rules: [git-env-rce-vars]
    command: "GIT_EDITOR=vim git status"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: editor-unsafe-r11-fallback-when-env-rule-disabled
    overlay: |
      disable_rules: [git-env-rce-vars]
    command: "EDITOR=vim git status"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: env-wrapper-editor-unsafe-r11-fallback-when-env-rule-disabled
    overlay: |
      disable_rules: [git-env-rce-vars]
    command: "env EDITOR=vim git status"
    expected: { decision: ask, rule_id: sensitive-env-assignment }
  - id: git-editor-noop-transparent-when-env-rule-disabled
    overlay: |
      disable_rules: [git-env-rce-vars]
    command: "GIT_EDITOR=true git status"
    expected: { decision: allow }
  - id: editor-noop-transparent-when-env-rule-disabled
    overlay: |
      disable_rules: [git-env-rce-vars]
    command: "EDITOR=true git status"
    expected: { decision: allow }

  # ============================================================
  # 1. CORE READ-ONLY COMMANDS (always safe)
  # ============================================================

  - id: git-status-safe
    command: "git status"
    expected:
      decision: allow
  - id: git-diff-safe
    command: "git diff"
    expected:
      decision: allow
  - id: git-diff-staged
    command: "git diff --staged"
    expected:
      decision: allow
  - id: git-log-safe
    command: "git log"
    expected:
      decision: allow
  - id: git-log-oneline
    command: "git log --oneline -10"
    expected:
      decision: allow
  - id: git-show-safe
    command: "git show"
    expected:
      decision: allow
  - id: git-show-commit
    command: "git show abc1234"
    expected:
      decision: allow
  - id: git-rev-parse-safe
    command: "git rev-parse HEAD"
    expected:
      decision: allow
  - id: git-blame-safe
    command: "git blame src/main.rs"
    expected:
      decision: allow
  - id: git-describe-safe
    command: "git describe --tags"
    expected:
      decision: allow
  - id: git-shortlog-safe
    command: "git shortlog -sn"
    expected:
      decision: allow
  - id: git-ls-files-safe
    command: "git ls-files"
    expected:
      decision: allow
  - id: git-ls-remote-safe
    command: "git ls-remote"
    expected:
      decision: allow
  - id: git-ls-remote-tags-origin
    command: "git ls-remote --tags origin"
    expected:
      decision: allow
  - id: git-ls-remote-piped-grep
    command: "git ls-remote --tags origin | grep v0.4.1"
    expected:
      decision: allow
  - id: git-ls-tree-safe
    command: "git ls-tree HEAD"
    expected:
      decision: allow
  - id: git-cat-file-safe
    command: "git cat-file -p HEAD"
    expected:
      decision: allow

  # ============================================================
  # 2. STAGING AND COMMITTING
  # ============================================================

  - id: git-add
    command: "git add ."
    expected:
      decision: allow
  - id: git-commit
    command: "git commit -m 'fix: some bug'"
    expected:
      decision: allow
  - id: git-commit-amend
    command: "git commit --amend"
    expected:
      decision: ask
      rule_id: git-commit-amend
  - id: git-commit-amend-message
    command: "git commit --amend -m 'updated message'"
    expected:
      decision: ask
      rule_id: git-commit-amend

  # ============================================================
  # 3. BRANCH OPERATIONS
  # ============================================================

  - id: git-branch-safe
    command: "git branch"
    expected:
      decision: allow
  - id: git-branch-list-safe
    command: "git branch -a"
    expected:
      decision: allow
  - id: git-branch-delete-safe
    command: "git branch -d feature"
    expected:
      decision: allow
    # Safe delete (fails if not merged)
  - id: git-branch-force-delete
    command: "git branch -D feature"
    expected:
      decision: ask
      rule_id: git-branch-delete-force
    # Force delete can lose unmerged work
  - id: git-switch-safe
    command: "git switch feature-branch"
    expected:
      decision: allow
  - id: git-restore-safe
    command: "git restore file.txt"
    expected:
      decision: allow

  # ============================================================
  # 4. REMOTE OPERATIONS
  # ============================================================

  - id: git-remote-list-safe
    command: "git remote -v"
    expected:
      decision: allow
  - id: git-remote-show-safe
    command: "git remote show origin"
    expected:
      decision: allow
  - id: git-remote-add
    command: "git remote add upstream https://github.com/foo/bar"
    expected:
      decision: ask
    # Modifies remote configuration
  - id: git-remote-remove
    command: "git remote remove origin"
    expected:
      decision: ask
    # Removes remote
  - id: git-remote-set-url
    command: "git remote set-url origin https://evil.com/repo"
    expected:
      decision: ask
    # Could redirect to malicious repo
  - id: git-fetch
    command: "git fetch origin"
    expected:
      decision: allow
  - id: git-pull-safe
    command: "git pull"
    expected:
      decision: allow
  - id: git-pull-origin
    command: "git pull origin main"
    expected:
      decision: allow
  - id: git-pull-rebase-safe
    command: "git pull --rebase"
    expected:
      decision: allow
  - id: git-pull-force-dangerous
    command: "git pull --force"
    expected:
      decision: ask
    # Can overwrite local changes
  - id: git-push
    command: "git push origin feature-branch"
    expected:
      decision: ask
    # git push requires full trust; default trust is standard

  # ============================================================
  # 5. TAG OPERATIONS
  # ============================================================

  - id: git-tag-list-safe
    command: "git tag -l"
    expected:
      decision: allow
  - id: git-tag-create-safe
    command: "git tag v1.0.0"
    expected:
      decision: allow
  - id: git-tag-delete
    command: "git tag -d v1.0.0"
    expected:
      decision: ask
    # Deletes tag
  - id: git-tag-delete-remote
    command: "git push origin --delete v1.0.0"
    expected:
      decision: ask
    # Deletes remote tag

  # ============================================================
  # 6. STASH OPERATIONS
  # ============================================================

  - id: git-stash-save-safe
    command: "git stash"
    expected:
      decision: allow
  - id: git-stash-push
    command: "git stash push"
    expected:
      decision: allow
  - id: git-stash-list-safe
    command: "git stash list"
    expected:
      decision: allow
  - id: git-stash-pop-safe
    command: "git stash pop"
    expected:
      decision: allow
  - id: git-stash-apply-safe
    command: "git stash apply"
    expected:
      decision: allow
  - id: git-stash-apply-index-safe
    command: "git stash apply stash@{0}"
    expected:
      decision: allow
  - id: git-stash-drop-dangerous
    command: "git stash drop"
    expected:
      decision: ask
    # Loses stashed work
  - id: git-stash-drop-specific
    command: "git stash drop stash@{0}"
    expected:
      decision: ask
    # Loses stashed work
  - id: git-stash-clear-dangerous
    command: "git stash clear"
    expected:
      decision: ask
    # Loses ALL stashed work

  # ============================================================
  # 7. HISTORY REWRITING (dangerous)
  # ============================================================

  # --- git reset ---
  - id: git-reset-hard
    command: "git reset --hard HEAD~1"
    expected:
      decision: ask
      rule_id: git-reset-hard
  - id: git-reset-hard-head
    command: "git reset --hard"
    expected:
      decision: ask
      rule_id: git-reset-hard

  # --- git clean ---
  - id: git-clean-f
    command: "git clean -f"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fd
    command: "git clean -fd"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fx
    command: "git clean -fx"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fxd
    command: "git clean -fxd"
    expected:
      decision: ask
      rule_id: git-clean-force

  # --- git revert (standard trust - creates new commit, non-destructive) ---
  - id: git-revert-safe
    command: "git revert HEAD"
    expected:
      decision: allow
  - id: git-revert-commit-safe
    command: "git revert abc123"
    expected:
      decision: allow

  # ============================================================
  # 8. CONFIG MODIFICATION
  # ============================================================

  - id: git-config-read-safe
    command: "git config user.name"
    expected:
      decision: allow
  - id: git-config-local-safe
    command: "git config user.email foo@bar.com"
    expected:
      decision: allow
    # Local config is relatively safe
  - id: git-config-global-dangerous
    command: "git config --global user.email foo@bar.com"
    expected:
      decision: ask
    # Modifies global git config
  - id: git-config-system-dangerous
    command: "git config --system core.editor vim"
    expected:
      decision: deny
      rule_id: git-config-rce-keys-spaceform
    # Persistent set of core.editor is on the RCE-key list; deny regardless
    # of value (vim today, /tmp/evil tomorrow). Was ASK pre-v0.16.9.

  # --- Repo-corrupting core flags (deny) ---
  - id: git-config-core-bare-deny
    command: "git config core.bare true"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.bare detaches the working tree; can silently corrupt the repo
  - id: git-config-core-worktree-deny
    command: "git config core.worktree /tmp/elsewhere"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.worktree redirects the working tree to an arbitrary path
  - id: git-config-core-hookspath-deny
    command: "git config core.hooksPath /tmp/evil-hooks"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.hooksPath redirects all git hooks to attacker-controlled scripts
  - id: git-config-core-repofmt-deny
    command: "git config core.repositoryformatversion 99"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.repositoryformatversion can render the repo unparseable
  - id: git-config-core-bare-global-deny
    command: "git config --global core.bare true"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # Critical (deny) wins over global (ask) — most-restrictive ordering
  # Bare READS of these keys (no value) are safe and must stay allow — only
  # SETTING them is dangerous. Regression guard for the min_args:3 fix.
  - id: git-config-core-hookspath-read-allow
    command: "git config core.hooksPath"
    expected:
      decision: allow
    # Reading the configured hooks path is harmless; the deny is for writes.
  - id: git-config-core-bare-read-allow
    command: "git config core.bare"
    expected:
      decision: allow
  - id: git-config-core-worktree-read-allow
    command: "git config core.worktree"
    expected:
      decision: allow
  - id: git-config-core-repofmt-read-allow
    command: "git config core.repositoryformatversion"
    expected:
      decision: allow
  - id: git-config-core-hookspath-get-read-allow
