# ============================================================
# GIT GOLDEN TESTS - Comprehensive git command coverage
# ============================================================
#
# Organization:
#   1. Core read-only commands (always safe)
#   2. Staging and committing
#   3. Branch operations
#   4. Remote operations
#   5. Tag operations
#   6. Stash operations
#   7. History rewriting (reset, clean, revert)
#   8. Config modification
#   9. Worktree operations
#   10. Reflog operations
#   11. GC operations
#   12. Bisect operations
#   13. File operations (mv, rm, grep)
#   14. Archive operations
#   15. Repository setup (clone, init)
#   16. Merge and cherry-pick
#   17. Force push (always ask)
#   18. Rebase (representative tests - see git-rebase.yaml for comprehensive coverage)
#   19. Special cases (symbolic-ref)
#
# ============================================================

tests:

  # ============================================================
  # 1. CORE READ-ONLY COMMANDS (always safe)
  # ============================================================

  - id: git-status-safe
    command: "git status"
    expected:
      decision: allow
  - id: git-diff-safe
    command: "git diff"
    expected:
      decision: allow
  - id: git-diff-staged
    command: "git diff --staged"
    expected:
      decision: allow
  - id: git-log-safe
    command: "git log"
    expected:
      decision: allow
  - id: git-log-oneline
    command: "git log --oneline -10"
    expected:
      decision: allow
  - id: git-show-safe
    command: "git show"
    expected:
      decision: allow
  - id: git-show-commit
    command: "git show abc1234"
    expected:
      decision: allow
  - id: git-rev-parse-safe
    command: "git rev-parse HEAD"
    expected:
      decision: allow
  - id: git-blame-safe
    command: "git blame src/main.rs"
    expected:
      decision: allow
  - id: git-describe-safe
    command: "git describe --tags"
    expected:
      decision: allow
  - id: git-shortlog-safe
    command: "git shortlog -sn"
    expected:
      decision: allow
  - id: git-ls-files-safe
    command: "git ls-files"
    expected:
      decision: allow
  - id: git-ls-remote-safe
    command: "git ls-remote"
    expected:
      decision: allow
  - id: git-ls-remote-tags-origin
    command: "git ls-remote --tags origin"
    expected:
      decision: allow
  - id: git-ls-remote-piped-grep
    command: "git ls-remote --tags origin | grep v0.4.1"
    expected:
      decision: allow
  - id: git-ls-tree-safe
    command: "git ls-tree HEAD"
    expected:
      decision: allow
  - id: git-cat-file-safe
    command: "git cat-file -p HEAD"
    expected:
      decision: allow

  # ============================================================
  # 2. STAGING AND COMMITTING
  # ============================================================

  - id: git-add
    command: "git add ."
    expected:
      decision: allow
  - id: git-commit
    command: "git commit -m 'fix: some bug'"
    expected:
      decision: allow
  - id: git-commit-amend
    command: "git commit --amend"
    expected:
      decision: ask
      rule_id: git-commit-amend
  - id: git-commit-amend-message
    command: "git commit --amend -m 'updated message'"
    expected:
      decision: ask
      rule_id: git-commit-amend

  # ============================================================
  # 3. BRANCH OPERATIONS
  # ============================================================

  - id: git-branch-safe
    command: "git branch"
    expected:
      decision: allow
  - id: git-branch-list-safe
    command: "git branch -a"
    expected:
      decision: allow
  - id: git-branch-delete-safe
    command: "git branch -d feature"
    expected:
      decision: allow
    # Safe delete (fails if not merged)
  - id: git-branch-force-delete
    command: "git branch -D feature"
    expected:
      decision: ask
      rule_id: git-branch-delete-force
    # Force delete can lose unmerged work
  - id: git-switch-safe
    command: "git switch feature-branch"
    expected:
      decision: allow
  - id: git-restore-safe
    command: "git restore file.txt"
    expected:
      decision: allow

  # ============================================================
  # 4. REMOTE OPERATIONS
  # ============================================================

  - id: git-remote-list-safe
    command: "git remote -v"
    expected:
      decision: allow
  - id: git-remote-show-safe
    command: "git remote show origin"
    expected:
      decision: allow
  - id: git-remote-add
    command: "git remote add upstream https://github.com/foo/bar"
    expected:
      decision: ask
    # Modifies remote configuration
  - id: git-remote-remove
    command: "git remote remove origin"
    expected:
      decision: ask
    # Removes remote
  - id: git-remote-set-url
    command: "git remote set-url origin https://evil.com/repo"
    expected:
      decision: ask
    # Could redirect to malicious repo
  - id: git-fetch
    command: "git fetch origin"
    expected:
      decision: allow
  - id: git-pull-safe
    command: "git pull"
    expected:
      decision: allow
  - id: git-pull-origin
    command: "git pull origin main"
    expected:
      decision: allow
  - id: git-pull-rebase-safe
    command: "git pull --rebase"
    expected:
      decision: allow
  - id: git-pull-force-dangerous
    command: "git pull --force"
    expected:
      decision: ask
    # Can overwrite local changes
  - id: git-push
    command: "git push origin feature-branch"
    expected:
      decision: ask
    # git push requires full trust; default trust is standard

  # ============================================================
  # 5. TAG OPERATIONS
  # ============================================================

  - id: git-tag-list-safe
    command: "git tag -l"
    expected:
      decision: allow
  - id: git-tag-create-safe
    command: "git tag v1.0.0"
    expected:
      decision: allow
  - id: git-tag-delete
    command: "git tag -d v1.0.0"
    expected:
      decision: ask
    # Deletes tag
  - id: git-tag-delete-remote
    command: "git push origin --delete v1.0.0"
    expected:
      decision: ask
    # Deletes remote tag

  # ============================================================
  # 6. STASH OPERATIONS
  # ============================================================

  - id: git-stash-save-safe
    command: "git stash"
    expected:
      decision: allow
  - id: git-stash-push
    command: "git stash push"
    expected:
      decision: allow
  - id: git-stash-list-safe
    command: "git stash list"
    expected:
      decision: allow
  - id: git-stash-pop-safe
    command: "git stash pop"
    expected:
      decision: allow
  - id: git-stash-apply-safe
    command: "git stash apply"
    expected:
      decision: allow
  - id: git-stash-apply-index-safe
    command: "git stash apply stash@{0}"
    expected:
      decision: allow
  - id: git-stash-drop-dangerous
    command: "git stash drop"
    expected:
      decision: ask
    # Loses stashed work
  - id: git-stash-drop-specific
    command: "git stash drop stash@{0}"
    expected:
      decision: ask
    # Loses stashed work
  - id: git-stash-clear-dangerous
    command: "git stash clear"
    expected:
      decision: ask
    # Loses ALL stashed work

  # ============================================================
  # 7. HISTORY REWRITING (dangerous)
  # ============================================================

  # --- git reset ---
  - id: git-reset-hard
    command: "git reset --hard HEAD~1"
    expected:
      decision: ask
      rule_id: git-reset-hard
  - id: git-reset-hard-head
    command: "git reset --hard"
    expected:
      decision: ask
      rule_id: git-reset-hard

  # --- git clean ---
  - id: git-clean-f
    command: "git clean -f"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fd
    command: "git clean -fd"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fx
    command: "git clean -fx"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fxd
    command: "git clean -fxd"
    expected:
      decision: ask
      rule_id: git-clean-force

  # --- git revert (standard trust - creates new commit, non-destructive) ---
  - id: git-revert-safe
    command: "git revert HEAD"
    expected:
      decision: allow
  - id: git-revert-commit-safe
    command: "git revert abc123"
    expected:
      decision: allow

  # ============================================================
  # 8. CONFIG MODIFICATION
  # ============================================================

  - id: git-config-read-safe
    command: "git config user.name"
    expected:
      decision: allow
  - id: git-config-local-safe
    command: "git config user.email foo@bar.com"
    expected:
      decision: allow
    # Local config is relatively safe
  - id: git-config-global-dangerous
    command: "git config --global user.email foo@bar.com"
    expected:
      decision: ask
    # Modifies global git config
  - id: git-config-system-dangerous
    command: "git config --system core.editor vim"
    expected:
      decision: deny
      rule_id: git-config-rce-keys
    # Persistent set of core.editor is on the RCE-key list; deny regardless
    # of value (vim today, /tmp/evil tomorrow). Was ASK pre-v0.16.9.

  # --- Repo-corrupting core flags (deny) ---
  - id: git-config-core-bare-deny
    command: "git config core.bare true"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.bare detaches the working tree; can silently corrupt the repo
  - id: git-config-core-worktree-deny
    command: "git config core.worktree /tmp/elsewhere"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.worktree redirects the working tree to an arbitrary path
  - id: git-config-core-hookspath-deny
    command: "git config core.hooksPath /tmp/evil-hooks"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.hooksPath redirects all git hooks to attacker-controlled scripts
  - id: git-config-core-repofmt-deny
    command: "git config core.repositoryformatversion 99"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.repositoryformatversion can render the repo unparseable
  - id: git-config-core-bare-global-deny
    command: "git config --global core.bare true"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # Critical (deny) wins over global (ask) — most-restrictive ordering

  # --- Joined key=value form (key and value as a single positional) ---
  - id: git-config-core-bare-joined-deny
    command: "git config core.bare=true"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # `key=value` joined-positional form must not bypass
  - id: git-config-core-hookspath-joined-deny
    command: "git config core.hooksPath=/tmp/evil"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags

  # --- `git -c key=value <subcommand>` ad-hoc override (the silent channel) ---
  - id: git-c-core-bare-commit-deny
    command: "git -c core.bare=true commit -m x"
    expected:
      decision: deny
      rule_id: git-c-corrupting-core-flags
    # The ad-hoc override channel that motivated the rule
  - id: git-c-core-hookspath-commit-deny
    command: "git -c core.hooksPath=/tmp/evil commit -am x"
    expected:
      decision: deny
      rule_id: git-c-corrupting-core-flags
  - id: git-c-core-worktree-status-deny
    command: "git -c core.worktree=/tmp/elsewhere status"
    expected:
      decision: deny
      rule_id: git-c-corrupting-core-flags

  # --- Reads and unsets must NOT deny (unset is the corruption fix path) ---
  - id: git-config-get-core-bare-allow
    command: "git config --get core.bare"
    expected:
      decision: allow
    # Read-only sanity check; falls through to allowlisted git config
  - id: git-config-unset-core-bare-allow
    command: "git config --unset core.bare"
    expected:
      decision: allow
    # `--unset core.bare` is the fix when the repo got corrupted; must not deny
  - id: git-config-list-core-allow
    command: "git config --list"
    expected:
      decision: allow
    # Plain --list listing should not be denied even though args may include core.X strings

  # --- `git log --grep core.bare` must NOT false-positive ---
  - id: git-log-grep-core-bare-allow
    command: "git log --grep core.bare"
    expected:
      decision: allow
    # Searching commit messages for the literal string is a read

  # --- --config-env injection variant ---
  - id: git-c-config-env-core-bare-deny
    command: "GIT_BARE=true git --config-env=core.bare=GIT_BARE status"
    expected:
      decision: deny
      rule_id: git-c-corrupting-core-flags
    # `--config-env=key=ENVVAR` is the env-var injection cousin of `-c key=value`

  # --- `git -c key=value` for SAFE keys must allow the underlying subcommand ---
  # Pre-fix these landed as ASK with reason "Unrecognized command: git" because
  # the `-c key=value` pair confused the allowlist's flag-skip logic.
  - id: git-c-commit-gpgsign-allow
    command: "git -c commit.gpgsign=false commit -m x"
    expected:
      decision: allow
    # The signing-toggle override is identical to a plain `git commit` for safety
  - id: git-c-user-email-commit-allow
    command: "git -c user.email=a@b commit -m x"
    expected:
      decision: allow
  - id: git-c-color-ui-log-allow
    command: "git -c color.ui=false log --oneline"
    expected:
      decision: allow
  - id: git-c-combined-uppercase-and-lowercase-allow
    command: "git -C /tmp/x -c commit.gpgsign=false commit -m foo"
    expected:
      decision: allow
    # `-C <path>` and `-c <key>=<value>` strip together
  - id: git-c-commit-gpgsign-push-still-asks
    command: "git -c commit.gpgsign=false push origin main"
    expected:
      decision: ask
    # The trust-gated git-push reason still surfaces; -c doesn't lift trust

  # --- `git -c key=value` RCE channels: substituted-program keys must deny ---
  - id: git-c-core-sshcommand-deny
    command: "git -c core.sshCommand=evil fetch"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-core-editor-commit-deny
    command: "git -c core.editor=/tmp/evil commit"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-core-pager-log-deny
    command: "git -c core.pager=/tmp/evil log"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-core-fsmonitor-deny
    command: "git -c core.fsmonitor=/tmp/evil status"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-core-gitproxy-deny
    command: "git -c core.gitProxy=/tmp/evil fetch"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-gpg-program-deny
    command: "git -c gpg.program=/tmp/evil commit -S -m x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-gpg-ssh-program-deny
    command: "git -c gpg.ssh.program=/tmp/evil commit -S -m x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-safe-directory-deny
    command: "git -c safe.directory=/tmp commit -m x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
    # safe.directory bypasses CVE-2022-24765 ownership-mismatch protection
  - id: git-c-protocol-ext-deny
    command: "git -c protocol.ext.allow=always clone ext::sh"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-protocol-file-deny
    command: "git -c protocol.file.allow=always clone file:///tmp/x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-uploadpack-hook-deny
    command: "git -c uploadpack.packObjectsHook=/tmp/evil push origin main"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-pager-log-deny
    command: "git -c pager.log=/tmp/evil log"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
    # pager.<cmd> sets a per-subcommand pager program

  # --- `--config-env` env-injection variants of the RCE channels ---
  - id: git-config-env-sshcommand-deny
    command: "GIT_SSH=evil git --config-env=core.sshCommand=GIT_SSH fetch"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-config-env-gpg-deny
    command: "GIT_GPG=evil git --config-env=gpg.program=GIT_GPG commit -S -m x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys

  # --- `git --git-dir` / `--work-tree` / `--namespace` space forms ---
  # Pre-fix these likely tripped the same flag-skip bug for some shapes.
  - id: git-git-dir-space-form-status-allow
    command: "git --git-dir /tmp/g status"
    expected:
      decision: allow
  - id: git-work-tree-space-form-status-allow
    command: "git --work-tree /tmp/w status"
    expected:
      decision: allow
  - id: git-namespace-space-form-log-allow
    command: "git --namespace ns log --oneline"
    expected:
      decision: allow

  # --- `git log --grep` must NOT false-positive on RCE-key strings ---
  - id: git-log-grep-sshcommand-allow
    command: "git log --grep=core.sshCommand"
    expected:
      decision: allow
    # The `--grep=PATTERN` form is one token starting with `--`; the joined
    # value is the pattern, not a config key, and must not trip the deny rule

  # --- Case-folding bypass coverage (git config keys are case-insensitive) ---
  - id: git-c-core-sshcommand-lowercase-deny
    command: "git -c core.sshcommand=evil fetch"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-core-sshcommand-uppercase-section-deny
    command: "git -c CORE.sshCommand=evil fetch"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-core-sshcommand-all-uppercase-deny
    command: "git -c core.SSHCOMMAND=evil fetch"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-safe-directory-uppercase-deny
    command: "git -c safe.DIRECTORY=/tmp commit -m x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-protocol-ext-uppercase-deny
    command: "git -c PROTOCOL.ext.allow=always clone ext::sh"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-gpg-uppercase-deny
    command: "git -c GPG.program=/tmp/evil commit -S -m x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys

  # --- Missed RCE keys: gpg.ssh.defaultKeyCommand, credential.helper, include.path ---
  - id: git-c-gpg-ssh-defaultkeycommand-deny
    command: "git -c gpg.ssh.defaultKeyCommand=/tmp/evil commit -S -m x"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-credential-helper-deny
    command: "git -c credential.helper=/tmp/evil push origin main"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-credential-per-url-helper-deny
    command: "git -c credential.https://x.com.helper=/tmp/evil push origin main"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-include-path-deny
    command: "git -c include.path=/tmp/evil status"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-includeif-gitdir-deny
    command: "git -c includeIf.gitdir:/tmp.path=/tmp/evil status"
    expected:
      decision: deny
      rule_id: git-c-rce-keys
  - id: git-c-includeif-onbranch-deny
    command: "git -c includeIf.onbranch:main.path=/tmp/evil status"
    expected:
      decision: deny
      rule_id: git-c-rce-keys

  # --- Persistent `git config <key> <value>` form must deny the same RCE keys ---
  - id: git-config-set-sshcommand-deny
    command: "git config core.sshCommand /tmp/evil"
    expected:
      decision: deny
      rule_id: git-config-rce-keys
  - id: git-config-set-sshcommand-local-flag-deny
    command: "git config --local core.sshCommand /tmp/evil"
    expected:
      decision: deny
      rule_id: git-config-rce-keys
  - id: git-config-set-sshcommand-global-flag-deny
    command: "git config --global core.sshCommand /tmp/evil"
    expected:
      decision: deny
      rule_id: git-config-rce-keys
  - id: git-config-set-sshcommand-uppercase-deny
    command: "git config CORE.sshCommand /tmp/evil"
    expected:
      decision: deny
      rule_id: git-config-rce-keys
  - id: git-config-set-credential-helper-deny
    command: "git config credential.helper /tmp/evil"
    expected:
      decision: deny
      rule_id: git-config-rce-keys
  - id: git-config-set-include-path-deny
    command: "git config include.path /tmp/evil"
    expected:
      decision: deny
      rule_id: git-config-rce-keys
  - id: git-config-set-keyvalue-form-deny
    command: "git config core.editor=/tmp/evil"
    expected:
      decision: deny
    # Joined form `git config key=value` (no separate value arg)

  # --- Persistent reads / unsets must NOT deny ---
  - id: git-config-get-sshcommand-allow
    command: "git config --get core.sshCommand"
    expected:
      decision: allow
  - id: git-config-unset-sshcommand-allow
    command: "git config --unset core.sshCommand"
    expected:
      decision: allow
    # Unset is the repair path after corruption; must not deny
  - id: git-config-list-allow
    command: "git config --list"
    expected:
      decision: allow
    # Bare list never denies despite reading core.X strings

  # --- git config --edit (silent rewrite via editor) ---
  - id: git-config-edit-deny
    command: "git config --edit"
    expected:
      decision: deny
      rule_id: git-config-edit
    # GIT_EDITOR can be agent-controlled; --edit becomes a silent rewrite
  - id: git-config-edit-short-deny
    command: "git config -e"
    expected:
      decision: deny
      rule_id: git-config-edit

  # --- Direct redirect writes to git admin files ---
  - id: redirect-write-git-config-deny
    command: "echo 'bare = true' >> .git/config"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin
    # Bypasses every command-based rule by going around `git` entirely
  - id: redirect-write-git-config-relative-deny
    command: "echo x >> ./.git/config"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin
  - id: redirect-write-git-head-deny
    command: "echo abc1234 > .git/HEAD"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin
  - id: redirect-write-git-refs-deny
    command: "echo abc1234 > .git/refs/heads/master"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin
  - id: redirect-write-git-hook-deny
    command: "printf '#!/bin/sh\\nrm -rf $HOME\\n' > .git/hooks/post-commit"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin

  # --- cp/install/ditto/rsync/mv/ln writes to git admin files ---
  - id: cp-overwrite-git-config-deny
    command: "cp /tmp/evil .git/config"
    expected:
      decision: deny
      rule_id: copy-overwrite-git-admin
    # cp is allowlisted at minimal trust; without this rule it would silently allow
  - id: cp-overwrite-git-hook-deny
    command: "cp /tmp/evil .git/hooks/post-commit"
    expected:
      decision: deny
      rule_id: copy-overwrite-git-admin
  - id: install-overwrite-git-config-deny
