# ============================================================
# GIT GOLDEN TESTS - Comprehensive git command coverage
# ============================================================
#
# Organization:
#   1. Core read-only commands (always safe)
#   2. Staging and committing
#   3. Branch operations
#   4. Remote operations
#   5. Tag operations
#   6. Stash operations
#   7. History rewriting (reset, clean, revert)
#   8. Config modification
#   9. Worktree operations
#   10. Reflog operations
#   11. GC operations
#   12. Bisect operations
#   13. File operations (mv, rm, grep)
#   14. Archive operations
#   15. Repository setup (clone, init)
#   16. Merge and cherry-pick
#   17. Force push (always ask)
#   18. Rebase (representative tests - see git-rebase.yaml for comprehensive coverage)
#   19. Special cases (symbolic-ref)
#
# ============================================================

tests:

  # ============================================================
  # 1. CORE READ-ONLY COMMANDS (always safe)
  # ============================================================

  - id: git-status-safe
    command: "git status"
    expected:
      decision: allow
  - id: git-diff-safe
    command: "git diff"
    expected:
      decision: allow
  - id: git-diff-staged
    command: "git diff --staged"
    expected:
      decision: allow
  - id: git-log-safe
    command: "git log"
    expected:
      decision: allow
  - id: git-log-oneline
    command: "git log --oneline -10"
    expected:
      decision: allow
  - id: git-show-safe
    command: "git show"
    expected:
      decision: allow
  - id: git-show-commit
    command: "git show abc1234"
    expected:
      decision: allow
  - id: git-rev-parse-safe
    command: "git rev-parse HEAD"
    expected:
      decision: allow
  - id: git-blame-safe
    command: "git blame src/main.rs"
    expected:
      decision: allow
  - id: git-describe-safe
    command: "git describe --tags"
    expected:
      decision: allow
  - id: git-shortlog-safe
    command: "git shortlog -sn"
    expected:
      decision: allow
  - id: git-ls-files-safe
    command: "git ls-files"
    expected:
      decision: allow
  - id: git-ls-remote-safe
    command: "git ls-remote"
    expected:
      decision: allow
  - id: git-ls-remote-tags-origin
    command: "git ls-remote --tags origin"
    expected:
      decision: allow
  - id: git-ls-remote-piped-grep
    command: "git ls-remote --tags origin | grep v0.4.1"
    expected:
      decision: allow
  - id: git-ls-tree-safe
    command: "git ls-tree HEAD"
    expected:
      decision: allow
  - id: git-cat-file-safe
    command: "git cat-file -p HEAD"
    expected:
      decision: allow

  # ============================================================
  # 2. STAGING AND COMMITTING
  # ============================================================

  - id: git-add
    command: "git add ."
    expected:
      decision: allow
  - id: git-commit
    command: "git commit -m 'fix: some bug'"
    expected:
      decision: allow
  - id: git-commit-amend
    command: "git commit --amend"
    expected:
      decision: ask
      rule_id: git-commit-amend
  - id: git-commit-amend-message
    command: "git commit --amend -m 'updated message'"
    expected:
      decision: ask
      rule_id: git-commit-amend

  # ============================================================
  # 3. BRANCH OPERATIONS
  # ============================================================

  - id: git-branch-safe
    command: "git branch"
    expected:
      decision: allow
  - id: git-branch-list-safe
    command: "git branch -a"
    expected:
      decision: allow
  - id: git-branch-delete-safe
    command: "git branch -d feature"
    expected:
      decision: allow
    # Safe delete (fails if not merged)
  - id: git-branch-force-delete
    command: "git branch -D feature"
    expected:
      decision: ask
      rule_id: git-branch-delete-force
    # Force delete can lose unmerged work
  - id: git-switch-safe
    command: "git switch feature-branch"
    expected:
      decision: allow
  - id: git-restore-safe
    command: "git restore file.txt"
    expected:
      decision: allow

  # ============================================================
  # 4. REMOTE OPERATIONS
  # ============================================================

  - id: git-remote-list-safe
    command: "git remote -v"
    expected:
      decision: allow
  - id: git-remote-show-safe
    command: "git remote show origin"
    expected:
      decision: allow
  - id: git-remote-add
    command: "git remote add upstream https://github.com/foo/bar"
    expected:
      decision: ask
    # Modifies remote configuration
  - id: git-remote-remove
    command: "git remote remove origin"
    expected:
      decision: ask
    # Removes remote
  - id: git-remote-set-url
    command: "git remote set-url origin https://evil.com/repo"
    expected:
      decision: ask
    # Could redirect to malicious repo
  - id: git-fetch
    command: "git fetch origin"
    expected:
      decision: allow
  - id: git-pull-safe
    command: "git pull"
    expected:
      decision: allow
  - id: git-pull-origin
    command: "git pull origin main"
    expected:
      decision: allow
  - id: git-pull-rebase-safe
    command: "git pull --rebase"
    expected:
      decision: allow
  - id: git-pull-force-dangerous
    command: "git pull --force"
    expected:
      decision: ask
    # Can overwrite local changes
  - id: git-push
    command: "git push origin feature-branch"
    expected:
      decision: ask
    # git push requires full trust; default trust is standard

  # ============================================================
  # 5. TAG OPERATIONS
  # ============================================================

  - id: git-tag-list-safe
    command: "git tag -l"
    expected:
      decision: allow
  - id: git-tag-create-safe
    command: "git tag v1.0.0"
    expected:
      decision: allow
  - id: git-tag-delete
    command: "git tag -d v1.0.0"
    expected:
      decision: ask
    # Deletes tag
  - id: git-tag-delete-remote
    command: "git push origin --delete v1.0.0"
    expected:
      decision: ask
    # Deletes remote tag

  # ============================================================
  # 6. STASH OPERATIONS
  # ============================================================

  - id: git-stash-save-safe
    command: "git stash"
    expected:
      decision: allow
  - id: git-stash-push
    command: "git stash push"
    expected:
      decision: allow
  - id: git-stash-list-safe
    command: "git stash list"
    expected:
      decision: allow
  - id: git-stash-pop-safe
    command: "git stash pop"
    expected:
      decision: allow
  - id: git-stash-apply-safe
    command: "git stash apply"
    expected:
      decision: allow
  - id: git-stash-apply-index-safe
    command: "git stash apply stash@{0}"
    expected:
      decision: allow
  - id: git-stash-drop-dangerous
    command: "git stash drop"
    expected:
      decision: ask
    # Loses stashed work
  - id: git-stash-drop-specific
    command: "git stash drop stash@{0}"
    expected:
      decision: ask
    # Loses stashed work
  - id: git-stash-clear-dangerous
    command: "git stash clear"
    expected:
      decision: ask
    # Loses ALL stashed work

  # ============================================================
  # 7. HISTORY REWRITING (dangerous)
  # ============================================================

  # --- git reset ---
  - id: git-reset-hard
    command: "git reset --hard HEAD~1"
    expected:
      decision: ask
      rule_id: git-reset-hard
  - id: git-reset-hard-head
    command: "git reset --hard"
    expected:
      decision: ask
      rule_id: git-reset-hard

  # --- git clean ---
  - id: git-clean-f
    command: "git clean -f"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fd
    command: "git clean -fd"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fx
    command: "git clean -fx"
    expected:
      decision: ask
      rule_id: git-clean-force
  - id: git-clean-fxd
    command: "git clean -fxd"
    expected:
      decision: ask
      rule_id: git-clean-force

  # --- git revert (standard trust - creates new commit, non-destructive) ---
  - id: git-revert-safe
    command: "git revert HEAD"
    expected:
      decision: allow
  - id: git-revert-commit-safe
    command: "git revert abc123"
    expected:
      decision: allow

  # ============================================================
  # 8. CONFIG MODIFICATION
  # ============================================================

  - id: git-config-read-safe
    command: "git config user.name"
    expected:
      decision: allow
  - id: git-config-local-safe
    command: "git config user.email foo@bar.com"
    expected:
      decision: allow
    # Local config is relatively safe
  - id: git-config-global-dangerous
    command: "git config --global user.email foo@bar.com"
    expected:
      decision: ask
    # Modifies global git config
  - id: git-config-system-dangerous
    command: "git config --system core.editor vim"
    expected:
      decision: ask
    # Modifies system-wide config

  # --- Repo-corrupting core flags (deny) ---
  - id: git-config-core-bare-deny
    command: "git config core.bare true"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.bare detaches the working tree; can silently corrupt the repo
  - id: git-config-core-worktree-deny
    command: "git config core.worktree /tmp/elsewhere"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.worktree redirects the working tree to an arbitrary path
  - id: git-config-core-hookspath-deny
    command: "git config core.hooksPath /tmp/evil-hooks"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.hooksPath redirects all git hooks to attacker-controlled scripts
  - id: git-config-core-repofmt-deny
    command: "git config core.repositoryformatversion 99"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # core.repositoryformatversion can render the repo unparseable
  - id: git-config-core-bare-global-deny
    command: "git config --global core.bare true"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # Critical (deny) wins over global (ask) — most-restrictive ordering

  # --- Joined key=value form (key and value as a single positional) ---
  - id: git-config-core-bare-joined-deny
    command: "git config core.bare=true"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags
    # `key=value` joined-positional form must not bypass
  - id: git-config-core-hookspath-joined-deny
    command: "git config core.hooksPath=/tmp/evil"
    expected:
      decision: deny
      rule_id: git-config-corrupting-core-flags

  # --- `git -c key=value <subcommand>` ad-hoc override (the silent channel) ---
  - id: git-c-core-bare-commit-deny
    command: "git -c core.bare=true commit -m x"
    expected:
      decision: deny
      rule_id: git-c-corrupting-core-flags
    # The ad-hoc override channel that motivated the rule
  - id: git-c-core-hookspath-commit-deny
    command: "git -c core.hooksPath=/tmp/evil commit -am x"
    expected:
      decision: deny
      rule_id: git-c-corrupting-core-flags
  - id: git-c-core-worktree-status-deny
    command: "git -c core.worktree=/tmp/elsewhere status"
    expected:
      decision: deny
      rule_id: git-c-corrupting-core-flags

  # --- Reads and unsets must NOT deny (unset is the corruption fix path) ---
  - id: git-config-get-core-bare-allow
    command: "git config --get core.bare"
    expected:
      decision: allow
    # Read-only sanity check; falls through to allowlisted git config
  - id: git-config-unset-core-bare-allow
    command: "git config --unset core.bare"
    expected:
      decision: allow
    # `--unset core.bare` is the fix when the repo got corrupted; must not deny
  - id: git-config-list-core-allow
    command: "git config --list"
    expected:
      decision: allow
    # Plain --list listing should not be denied even though args may include core.X strings

  # --- `git log --grep core.bare` must NOT false-positive ---
  - id: git-log-grep-core-bare-allow
    command: "git log --grep core.bare"
    expected:
      decision: allow
    # Searching commit messages for the literal string is a read

  # --- --config-env injection variant ---
  - id: git-c-config-env-core-bare-deny
    command: "GIT_BARE=true git --config-env=core.bare=GIT_BARE status"
    expected:
      decision: deny
      rule_id: git-c-corrupting-core-flags
    # `--config-env=key=ENVVAR` is the env-var injection cousin of `-c key=value`

  # --- git config --edit (silent rewrite via editor) ---
  - id: git-config-edit-deny
    command: "git config --edit"
    expected:
      decision: deny
      rule_id: git-config-edit
    # GIT_EDITOR can be agent-controlled; --edit becomes a silent rewrite
  - id: git-config-edit-short-deny
    command: "git config -e"
    expected:
      decision: deny
      rule_id: git-config-edit

  # --- Direct redirect writes to git admin files ---
  - id: redirect-write-git-config-deny
    command: "echo 'bare = true' >> .git/config"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin
    # Bypasses every command-based rule by going around `git` entirely
  - id: redirect-write-git-config-relative-deny
    command: "echo x >> ./.git/config"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin
  - id: redirect-write-git-head-deny
    command: "echo abc1234 > .git/HEAD"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin
  - id: redirect-write-git-refs-deny
    command: "echo abc1234 > .git/refs/heads/master"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin
  - id: redirect-write-git-hook-deny
    command: "printf '#!/bin/sh\\nrm -rf $HOME\\n' > .git/hooks/post-commit"
    expected:
      decision: deny
      rule_id: redirect-write-git-admin

  # --- Protected-ref update-ref (the incident pattern) ---
  - id: git-update-ref-master-deny
    command: "git update-ref refs/heads/master HEAD"
    expected:
      decision: deny
      rule_id: git-update-ref-protected
    # The exact pattern from the 2026-05-09 incident
  - id: git-update-ref-main-deny
    command: "git update-ref refs/heads/main HEAD"
    expected:
      decision: deny
      rule_id: git-update-ref-protected
  - id: git-update-ref-feature-branch-ask
    command: "git update-ref refs/heads/feature-x HEAD"
    expected:
      decision: ask
      rule_id: git-update-ref
    # Non-protected ref still falls through to the high/ask rule
    # (HEAD as value, not target — must not false-positive)
  - id: git-update-ref-head-target-ask
    command: "git update-ref HEAD abc1234"
    expected:
      decision: ask
      rule_id: git-update-ref
    # Moving HEAD itself is rare-but-not-protected; falls through to ask
    # (positional matching would let us deny this without false-positives,
    #  but longline's args matcher is positional-agnostic — acceptable trade-off)

  # ============================================================
  # 9. WORKTREE OPERATIONS
  # ============================================================

  - id: git-worktree-list-safe
    command: "git worktree list"
    expected:
      decision: allow
  - id: git-worktree-add-safe
    command: "git worktree add ../feature feature-branch"
    expected:
      decision: allow
  - id: git-worktree-remove-dangerous
    command: "git worktree remove ../feature"
    expected:
      decision: ask
    # Removes worktree directory
  - id: git-worktree-prune-dangerous
    command: "git worktree prune"
    expected:
      decision: ask
    # Removes stale worktree info

  # ============================================================
  # 10. REFLOG OPERATIONS
  # ============================================================

  - id: git-reflog-show-safe
    command: "git reflog"
    expected:
      decision: allow
  - id: git-reflog-show-branch-safe
    command: "git reflog show main"
    expected:
      decision: allow
  - id: git-reflog-delete-dangerous
    command: "git reflog delete HEAD@{0}"
    expected:
      decision: ask
    # Loses reflog history
  - id: git-reflog-expire-dangerous
    command: "git reflog expire --expire=now --all"
    expected:
      decision: ask
    # Expires all reflog entries

  # ============================================================
  # 11. GC OPERATIONS
  # ============================================================

  - id: git-gc-safe
    command: "git gc"
    expected:
      decision: ask
  - id: git-gc-auto-safe
    command: "git gc --auto"
    expected:
      decision: ask
  - id: git-gc-prune-now-dangerous
    command: "git gc --prune=now"
    expected:
      decision: ask
    # Immediately removes unreachable objects
  - id: git-gc-aggressive-dangerous
    command: "git gc --aggressive --prune=now"
    expected:
      decision: ask
    # Aggressive pruning can lose data

  # ============================================================
  # 12. BISECT OPERATIONS
  # ============================================================

  - id: git-bisect-start-safe
    command: "git bisect start"
    expected:
      decision: allow
  - id: git-bisect-good-safe
    command: "git bisect good"
    expected:
      decision: allow
  - id: git-bisect-reset-dangerous
    command: "git bisect reset"
    expected:
      decision: ask
    # Exits bisect, changes HEAD

  # ============================================================
  # 13. FILE OPERATIONS (mv, rm, grep)
  # ============================================================

  # --- git mv ---
  - id: git-mv-safe
    command: "git mv old.txt new.txt"
    expected:
      decision: allow
  - id: git-mv-dir-safe
    command: "git mv src/old src/new"
    expected:
      decision: allow

  # --- git rm ---
  - id: git-rm-safe
    command: "git rm file.txt"
    expected:
      decision: allow
  - id: git-rm-cached-safe
    command: "git rm --cached file.txt"
    expected:
      decision: allow

  # --- git grep ---
  - id: git-grep-safe
    command: "git grep 'pattern'"
    expected:
      decision: allow
  - id: git-grep-files-safe
    command: "git grep -l 'TODO'"
    expected:
      decision: allow

  # ============================================================
  # 14. ARCHIVE OPERATIONS
  # ============================================================

  - id: git-archive-safe
    command: "git archive HEAD"
    expected:
      decision: allow
  - id: git-archive-output-safe
    command: "git archive --format=tar HEAD -o archive.tar"
    expected:
      decision: allow

  # ============================================================
  # 15. REPOSITORY SETUP (clone, init)
  # ============================================================

  - id: git-clone-safe
    command: "git clone https://github.com/user/repo.git"
    expected:
      decision: allow
  - id: git-init-safe
    command: "git init"
    expected:
      decision: allow

  # ============================================================
  # 16. MERGE AND CHERRY-PICK
  # ============================================================

  - id: git-merge
    command: "git merge feature-branch"
    expected:
      decision: allow
  - id: git-cherry-pick
    command: "git cherry-pick abc1234"
    expected:
      decision: allow

  # ============================================================
  # 17. FORCE PUSH (always ask)
  # ============================================================

  # --- Force push to main/master (--force) ---
  - id: git-force-push-main
    command: "git push --force origin main"
    expected:
      decision: ask
      rule_id: git-force-push-main
  - id: git-force-push-master
    command: "git push -f origin master"
    expected:
      decision: ask
      rule_id: git-force-push-main

  # --- Force push to main/master (--force-with-lease) ---
  - id: git-force-with-lease-push-main
    command: "git push --force-with-lease origin main"
    expected:
      decision: ask
      rule_id: git-force-push-main
  - id: git-force-with-lease-push-master
    command: "git push --force-with-lease origin master"
    expected:
      decision: ask
      rule_id: git-force-push-main

  # --- Force push to non-main branches (--force) ---
  - id: git-force-push-feature
    command: "git push --force origin feature-branch"
    expected:
      decision: ask
      rule_id: git-force-push-any
  - id: git-force-push-feature-short
    command: "git push -f origin feature-branch"
    expected:
      decision: ask
      rule_id: git-force-push-any

  # --- Force push to non-main branches (--force-with-lease) ---
  - id: git-force-with-lease-push-feature
    command: "git push --force-with-lease origin feature-branch"
    expected:
      decision: ask
      rule_id: git-force-push-any
  - id: git-force-with-lease-push-refspec
    command: "git push --force-with-lease=origin/main origin feature-branch"
    expected:
      decision: ask
      rule_id: git-force-push-any
    # --force-with-lease=<refspec> variant

  # --- Force push with --force-if-includes (Git 2.30+) ---
  - id: git-force-if-includes-push-main
    command: "git push --force-if-includes origin main"
    expected:
      decision: ask
      rule_id: git-force-push-main
  - id: git-force-if-includes-push-feature
    command: "git push --force-if-includes origin feature-branch"
    expected:
      decision: ask
      rule_id: git-force-push-any

  # --- Combined force flags ---
  - id: git-force-with-lease-and-force-push-main
    command: "git push --force-with-lease --force origin main"
    expected:
      decision: ask
      rule_id: git-force-push-main

  # --- Force push bare (no remote/branch specified) ---
  - id: git-force-push-bare
    command: "git push --force"
    expected:
      decision: ask
      rule_id: git-force-push-any
  - id: git-force-push-bare-short
    command: "git push -f"
    expected:
      decision: ask
      rule_id: git-force-push-any
  - id: git-force-with-lease-bare
    command: "git push --force-with-lease"
    expected:
      decision: ask
      rule_id: git-force-push-any

  # --- Force push with -C flag ---
  - id: git-C-force-push-main
    command: "git -C /tmp push --force origin main"
    expected:
      decision: ask
      rule_id: git-force-push-main
  - id: git-C-force-with-lease-push
    command: "git -C /tmp push --force-with-lease origin feature"
    expected:
      decision: ask
      rule_id: git-force-push-any

  # --- Plain push (no force) - ask at default standard trust ---
  - id: git-push-plain
    command: "git push"
    expected:
      decision: ask
    # No force flags, but git push requires full trust
  - id: git-push-origin
    command: "git push origin"
    expected:
      decision: ask
    # No force flags, but git push requires full trust
  - id: git-push-upstream
    command: "git push -u origin feature-branch"
    expected:
      decision: ask
    # -u/--set-upstream is not a force flag

  # ============================================================
  # 18. REBASE
  # ============================================================
  # For comprehensive rebase tests (48 cases), see: git-rebase.yaml
  # These are representative tests only

  - id: git-rebase-basic-asks
    command: "git rebase main"
    expected:
      decision: ask
      rule_id: git-rebase
  - id: git-rebase-abort-asks
    command: "git rebase --abort"
    expected:
      decision: ask
      rule_id: git-rebase
  - id: git-rebase-skip-asks
    command: "git rebase --skip"
    expected:
      decision: ask
      rule_id: git-rebase

  # ============================================================
  # 19. SPECIAL CASES
  # ============================================================

  # --- git check-ignore (read-only) ---
  - id: git-check-ignore-file
    command: "git check-ignore file.txt"
    expected:
      decision: allow
    # Read-only: checks if file matches gitignore patterns
  - id: git-check-ignore-verbose
    command: "git check-ignore -v node_modules"
    expected:
      decision: allow
    # Read-only: verbose output shows which pattern matched
  - id: git-check-ignore-stdin
    command: "git check-ignore --stdin"
    expected:
      decision: allow
    # Read-only: reads paths from stdin

  # --- git symbolic-ref (read-only queries) ---
  - id: git-symbolic-ref-read-safe
    command: "git symbolic-ref HEAD"
    expected:
      decision: allow
    # Read-only: shows what ref HEAD points to
  - id: git-symbolic-ref-delete-dangerous
    command: "git symbolic-ref --delete HEAD"
    expected:
      decision: ask
      rule_id: git-symbolic-ref-delete
    # Destructive operation - removes symbolic references
  - id: git-symbolic-ref-short-safe
    command: "git symbolic-ref --short HEAD"
    expected:
      decision: allow
    # Read-only: shows branch name without refs/heads/ prefix
  - id: git-symbolic-ref-quiet
    command: "git symbolic-ref -q HEAD"
    expected:
      decision: allow
    # Read-only: quiet mode, no error if not symbolic ref

  # --- git show-ref (read-only) ---
  - id: git-show-ref-basic
    command: "git show-ref"
    expected:
      decision: allow
    # Read-only: lists all refs
  - id: git-show-ref-heads
    command: "git show-ref --heads"
    expected:
      decision: allow
    # Read-only: lists branch refs only
  - id: git-show-ref-tags
    command: "git show-ref --tags"
    expected:
      decision: allow
    # Read-only: lists tag refs only
  - id: git-show-ref-verify
    command: "git show-ref --verify refs/heads/main"
    expected:
      decision: allow
    # Read-only: verifies a specific ref exists

  # --- git diff-tree (read-only plumbing) ---
  - id: git-diff-tree-basic
    command: "git diff-tree --no-commit-id -r HEAD"
    expected:
      decision: allow
    # Read-only: shows changes in a commit
  - id: git-diff-tree-name-status
    command: "git diff-tree --no-commit-id -r --name-status c4f7087"
    expected:
      decision: allow
    # Read-only: shows file changes with status letters
  - id: git-diff-tree-range
    command: "git diff-tree --no-commit-id -r --name-status f933d86..c4f7087"
    expected:
      decision: allow
    # Read-only: shows changes between two commits

  # --- git -C flag (allowlist matches once -C is stripped) ---
  - id: git-C-status-allow
    command: "git -C /tmp status"
    expected:
      decision: allow
    # Safe command with -C flag
  - id: git-C-reset-hard-ask
    command: "git -C /tmp reset --hard"
    expected:
      decision: ask
      rule_id: git-reset-hard
    # Destructive command with -C flag, rule still fires
  - id: git-C-clean-f-ask
    command: "git -C /tmp clean -f"
    expected:
      decision: ask
      rule_id: git-clean-force
    # Destructive command with -C flag, rule still fires
  - id: git-C-rebase-ask
    command: "git -C /tmp rebase main"
    expected:
      decision: ask
      rule_id: git-rebase
    # Destructive command with -C flag, rule still fires
  - id: git-C-push-force-ask
    command: "git -C /tmp push --force origin main"
    expected:
      decision: ask
      rule_id: git-force-push-main
    # Force push with -C flag, rule still fires

  # --- git combined short flags (should still match rules) ---
  - id: git-clean-ffd-ask
    command: "git clean -ffd"
    expected:
      decision: ask
      rule_id: git-clean-force
    # Combined flags contain -f
  - id: git-clean-ffdx-ask
    command: "git clean -ffdx"
    expected:
      decision: ask
      rule_id: git-clean-force
    # Combined flags contain -f
  - id: git-clean-xdf-ask
    command: "git clean -xdf"
    expected:
      decision: ask
      rule_id: git-clean-force
    # Common combined flags ordering still contains -f

  # --- git subcommands that execute arbitrary shell / rewrite refs ---
  - id: git-submodule-foreach-ask
    command: "git submodule foreach 'rm -rf /'"
    expected:
      decision: ask
    # Runs an arbitrary command per-submodule; should never be allowlisted
  - id: git-alias-shell-ask
    command: "git -c alias.x='!rm -rf /' x"
    expected:
      decision: ask
    # Git aliases with '!' execute a shell command
  - id: git-update-ref-delete-main-deny
    command: "git update-ref -d refs/heads/main"
    expected:
      decision: deny
      rule_id: git-update-ref-protected
    # Deleting main branch ref is denied (protected ref)
  - id: git-filter-branch-deny
    command: "git filter-branch -- --all"
    expected:
      decision: deny
      rule_id: git-filter-branch
    # History rewriting; denied
  - id: git-filter-repo-deny
    command: "git filter-repo --force"
    expected:
      decision: deny
      rule_id: git-filter-repo
    # History rewriting via subcommand form
  - id: git-filter-repo-direct-deny
    command: "git-filter-repo --force"
    expected:
      decision: deny
      rule_id: git-filter-repo-direct
    # History rewriting via direct executable form
  - id: git-replace-deny
    command: "git replace --edit abc1234"
    expected:
      decision: deny
      rule_id: git-replace
    # Manipulates the commit graph
  - id: git-replace-graft-deny
    command: "git replace --graft abc1234 def5678"
    expected:
      decision: deny
      rule_id: git-replace
