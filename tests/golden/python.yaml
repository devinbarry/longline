tests:
  # ════════════════════════════════════════════════════════════════
  # uv: additional safe operations
  # ════════════════════════════════════════════════════════════════
  # Positive tests (should allow)
  - id: uv-sync-safe
    command: "uv sync"
    expected:
      decision: allow
  - id: uv-sync-frozen-safe
    command: "uv sync --frozen"
    expected:
      decision: allow
  - id: uv-lock-safe
    command: "uv lock"
    expected:
      decision: allow
  - id: uv-lock-upgrade-safe
    command: "uv lock --upgrade"
    expected:
      decision: allow
  - id: uv-venv-safe
    command: "uv venv"
    expected:
      decision: allow
  - id: uv-venv-path-safe
    command: "uv venv .venv"
    expected:
      decision: allow
  - id: uv-pip-safe
    command: "uv pip"
    expected:
      decision: allow
  - id: uv-pip-list-safe
    command: "uv pip list"
    expected:
      decision: allow
  - id: uv-cache-dir-safe
    command: "uv cache dir"
    expected:
      decision: ask
    note: "uv cache not explicitly allowlisted"
  - id: uv-pip-install-safe
    command: "uv pip install requests"
    expected:
      decision: ask
      rule_id: uv-pip-install
  - id: uv-run-precommit-safe
    command: "uv run pre-commit"
    expected:
      decision: allow
  - id: uv-run-precommit-all-safe
    command: "uv run pre-commit run --all-files"
    expected:
      decision: allow
  - id: uv-run-precommit-install-safe
    command: "uv run pre-commit install"
    expected:
      decision: allow
  - id: uv-version-safe
    command: "uv --version"
    expected:
      decision: allow
  - id: uv-version-short-safe
    command: "uv -V"
    expected:
      decision: allow
  - id: uv-help-safe
    command: "uv --help"
    expected:
      decision: allow

  # ════════════════════════════════════════════════════════════════
  # python: pytest as module
  # ════════════════════════════════════════════════════════════════
  # Positive tests (should allow)
  - id: python-m-pytest-safe
    command: "python -m pytest"
    expected:
      decision: allow
  - id: python-m-pytest-verbose-safe
    command: "python -m pytest -v"
    expected:
      decision: allow
  - id: python-m-pytest-path-safe
    command: "python -m pytest tests/"
    expected:
      decision: allow
  - id: python3-m-pytest-safe
    command: "python3 -m pytest"
    expected:
      decision: allow
  - id: python3-m-pytest-verbose-safe
    command: "python3 -m pytest -v"
    expected:
      decision: allow
  - id: python3-m-pytest-path-safe
    command: "python3 -m pytest tests/unit/"
    expected:
      decision: allow

  # ════════════════════════════════════════════════════════════════
  # uv run python -m pytest: wrapped pytest invocations
  # ════════════════════════════════════════════════════════════════
  - id: uv-run-python-m-pytest-safe
    command: "uv run python -m pytest"
    expected:
      decision: allow
  - id: uv-run-python-m-pytest-verbose-safe
    command: "uv run python -m pytest -v --tb=short"
    expected:
      decision: allow
  - id: uv-run-python-m-pytest-path-safe
    command: "uv run python -m pytest flows/tests/ -v --tb=short"
    expected:
      decision: allow
  - id: uv-run-python-m-pytest-redirect-safe
    command: "uv run python -m pytest tests/ -v 2>&1"
    expected:
      decision: allow
  - id: uv-run-python3-m-pytest-safe
    command: "uv run python3 -m pytest tests/"
    expected:
      decision: allow
  - id: uv-run-python3-m-pytest-verbose-safe
    command: "uv run python3 -m pytest tests/ -v --tb=short 2>&1"
    expected:
      decision: allow

  # uv run value-flag forms: space-separated values (--project /path, -p /path,
  # --directory /path, --python VER) must match "uv run X" allowlist entries.
  # The equals form and bool flags also must keep working.
  - id: uv-run-project-space-ruff-safe
    command: "uv run --project /tmp ruff check ."
    expected:
      decision: allow
  - id: uv-run-project-space-pytest-safe
    command: "uv run --project /tmp pytest"
    expected:
      decision: allow
  - id: uv-run-short-p-space-ruff-safe
    command: "uv run -p /tmp ruff --version"
    expected:
      decision: allow
  - id: uv-run-directory-space-mypy-safe
    command: "uv run --directory /tmp mypy src/"
    expected:
      decision: allow
  - id: uv-run-python-version-space-ruff-safe
    command: "uv run --python 3.12 ruff check ."
    expected:
      decision: allow
  - id: uv-run-project-equals-ruff-safe
    command: "uv run --project=/tmp ruff check ."
    expected:
      decision: allow
  - id: uv-run-isolated-ruff-safe
    command: "uv run --isolated ruff --version"
    expected:
      decision: allow
  - id: uv-run-project-original-report-safe
    command: 'uv run --project /Users/a/proj ruff --version 2>/dev/null || echo "cannot run ruff"'
    expected:
      decision: allow

  # uv run dependency-group selectors: --extra/--group (space-separated
  # value-flags) and --no-sync (bool flag) must not block the inner
  # command from being found and matched against its allowlist entry.
  - id: uv-run-extra-group-ruff-safe
    command: "uv run --extra dev --group dev ruff check src/"
    expected:
      decision: allow
  - id: uv-run-extra-group-pytest-safe
    command: "UV_CACHE_DIR=/tmp/uv-cache uv run --extra dev --group dev pytest -q"
    expected:
      decision: allow
  - id: uv-run-no-sync-pytest-safe
    command: "uv run --no-sync pytest -q"
    expected:
      decision: allow
  - id: uv-run-extra-only-yamllint-safe
    command: "uv run --extra dev yamllint config.yml"
    expected:
      decision: allow

  # Negative: --extra/--group/--no-sync must not let a DANGEROUS inner
  # command bypass policy just because it now resolves past the flags.
  - id: uv-run-extra-group-rm-denies
    command: "uv run --extra dev --group dev rm -rf /"
    expected:
      decision: deny
      rule_id: rm-recursive-root
  - id: uv-run-no-sync-rm-denies
    command: "uv run --no-sync rm -rf /"
    expected:
      decision: deny
      rule_id: rm-recursive-root
  - id: uv-run-extra-group-unallowlisted-tool-asks
    command: "uv run --extra dev --group dev dangeroustool"
    expected:
      decision: ask

  # Unknown wrapper flags (not enumerated in uv's value/bool flag tables) are
  # skipped as booleans rather than mistaken for the inner command name. This is
  # correct-by-construction coverage for uv's long tail of flags (--offline,
  # --no-cache, --refresh, and any future additions) so the inner command is
  # still found and matched against its allowlist entry — no whack-a-mole.
  - id: uv-run-offline-pytest-safe
    command: "uv run --offline pytest -q"
    expected:
      decision: allow
  - id: uv-run-no-cache-refresh-ruff-safe
    command: "uv run --no-cache --refresh ruff check src/"
    expected:
      decision: allow
  - id: uv-run-unknown-flag-yamllint-safe
    command: "uv run --some-future-flag yamllint config.yml"
    expected:
      decision: allow
  # Negative: skipping unknown flags must NOT let a dangerous inner command
  # bypass policy — the inner command is still evaluated in full.
  - id: uv-run-offline-rm-denies
    command: "uv run --offline rm -rf /"
    expected:
      decision: deny
      rule_id: rm-recursive-root
  - id: uv-run-unknown-flag-unallowlisted-tool-asks
    command: "uv run --some-future-flag dangeroustool"
    expected:
      decision: ask

  # ════════════════════════════════════════════════════════════════
  # Python dev tools invoked directly (allowlisted; representative
  # allow-coverage for entries that previously had no golden assertion).
  # ════════════════════════════════════════════════════════════════
  - id: ruff-check-bare-safe
    command: "ruff check src/"
    expected:
      decision: allow
  - id: mypy-bare-safe
    command: "mypy src/"
    expected:
      decision: allow
  - id: black-check-bare-safe
    command: "black --check ."
    expected:
      decision: allow
  - id: pytest-bare-safe
    command: "pytest tests/"
    expected:
      decision: allow
    note: "Bare pytest (not via `python -m pytest`) is allowlisted"
