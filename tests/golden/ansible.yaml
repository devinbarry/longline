tests:
  # ── ansible-doc: read-only module documentation (allow) ──────
  - id: ansible-doc-module
    command: "ansible-doc community.general.crypttab"
    expected:
      decision: allow
  - id: ansible-doc-list
    command: "ansible-doc -l"
    expected:
      decision: allow
  - id: uv-run-ansible-doc
    command: "uv run ansible-doc community.general.crypttab"
    expected:
      decision: allow

  # ── ansible-playbook --syntax-check: parse-only, no hosts (allow) ──
  - id: ansible-playbook-syntax-check
    command: "ansible-playbook --syntax-check site.yml"
    expected:
      decision: allow
  - id: ansible-playbook-syntax-check-inv
    command: "ansible-playbook --syntax-check -i inventory/hosts.yml site.yml"
    expected:
      decision: allow
  - id: uv-run-ansible-playbook-syntax-check
    command: "uv run ansible-playbook --syntax-check -i inventory/hosts.yml site.yml"
    expected:
      decision: allow
  - id: uv-run-ansible-playbook-syntax-check-with-env
    command: "ANSIBLE_ROLES_PATH=roles:/root/.ansible/roles uv run ansible-playbook --syntax-check -i inventory/hosts.yml site.yml"
    expected:
      decision: allow

  # ── Real playbook runs / --check contact hosts (ask) ─────────
  - id: ansible-playbook-real-run-asks
    command: "ansible-playbook -i inventory/hosts.yml site.yml"
    expected:
      decision: ask
  - id: uv-run-ansible-playbook-real-run-asks
    command: "uv run ansible-playbook -i inventory/hosts.yml site.yml"
    expected:
      decision: ask
  - id: ansible-playbook-check-mode-asks
    command: "ansible-playbook --check -i inventory/hosts.yml site.yml"
    expected:
      decision: ask
  - id: uv-run-ansible-playbook-check-mode-asks
    command: "uv run ansible-playbook --check -i inventory/hosts.yml site.yml"
    expected:
      decision: ask

  # ── ansible-lint: standard dev tool, no hosts contacted (allow) ─
  - id: ansible-lint-bare
    command: "ansible-lint roles/foo/tasks/main.yml"
    expected:
      decision: allow
  - id: uv-run-ansible-lint
    command: "uv run ansible-lint roles/foo/tasks/main.yml"
    expected:
      decision: allow
  - id: uv-run-ansible-lint-extra-group
    command: "UV_CACHE_DIR=/tmp/uv-cache uv run --extra dev --group dev ansible-lint roles/foo/tasks/main.yml"
    expected:
      decision: allow
  - id: ansible-lint-fix-allowed-like-other-dev-tools
    command: "ansible-lint --fix roles/foo/tasks/main.yml"
    expected:
      decision: allow
  - id: uv-run-ansible-lint-fix-allowed-like-other-dev-tools
    command: "uv run ansible-lint --fix roles/foo/tasks/main.yml"
    expected:
      decision: allow

  # ── ansible --version: version info only (allow) ─────────────
  - id: ansible-version-bare
    command: "ansible --version"
    expected:
      decision: allow
  - id: uv-run-ansible-version
    command: "uv run ansible --version"
    expected:
      decision: allow

  # ── ansible ad-hoc execution: module is attacker-controlled (ask) ──
  - id: ansible-adhoc-debug-module-still-asks
    command: "ansible localhost -c local -m debug -a 'msg=test'"
    expected:
      decision: ask
